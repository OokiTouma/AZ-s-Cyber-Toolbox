<body class="spell-search-page">
    <!-- 页面头部 -->
    <header class="page-header">
        <a href="/AZ-s-Cyber-Toolbox/index.html" class="back-link">返回首页</a>
        <h1 class="page-title">🪄 法术速查</h1>
        <p class="page-subtitle">快速查找和浏览所有法术，支持多维度筛选</p>
    </header>

    <!-- 主容器 -->
    <main class="spell-container">
        <!-- 搜索面板 -->
        <div class="search-panel">
            <div class="search-grid">
                <div class="search-group">
                    <label class="search-label">法术名称</label>
                    <input type="text" class="search-input" id="searchName" placeholder="输入法术名称..." oninput="filterSpells()">
                </div>
                <div class="search-group">
                    <label class="search-label">法术环阶</label>
                    <select class="search-select" id="searchLevel" onchange="filterSpells()">
                        <option value="">全部环阶</option>
                        <option value="0">戏法 (0环)</option>
                        <option value="1">1环</option>
                        <option value="2">2环</option>
                        <option value="3">3环</option>
                        <option value="4">4环</option>
                        <option value="5">5环</option>
                        <option value="6">6环</option>
                        <option value="7">7环</option>
                        <option value="8">8环</option>
                        <option value="9">9环</option>
                    </select>
                </div>
                <div class="search-group">
                    <label class="search-label">法术学派</label>
                    <select class="search-select" id="searchSchool" onchange="filterSpells()">
                        <option value="">全部学派</option>
                        <option value="防护">防护</option>
                        <option value="咒法">咒法</option>
                        <option value="预言">预言</option>
                        <option value="惑控">惑控</option>
                        <option value="塑能">塑能</option>
                        <option value="幻术">幻术</option>
                        <option value="死灵">死灵</option>
                        <option value="变化">变化</option>
                    </select>
                </div>
                <div class="search-group">
                    <label class="search-label">职业</label>
                    <select class="search-select" id="searchClass" onchange="filterSpells()">
                        <option value="">全部职业</option>
                        <option value="bard">吟游诗人</option>
                        <option value="cleric">牧师</option>
                        <option value="druid">德鲁伊</option>
                        <option value="paladin">圣武士</option>
                        <option value="ranger">游侠</option>
                        <option value="sorcerer">术士</option>
                        <option value="warlock">邪术师</option>
                        <option value="wizard">法师</option>
                    </select>
                </div>
            </div>

            <!-- 高级筛选 -->
            <div class="advanced-filters">
                <div class="filters-header">
                    <span class="filters-title">🔍 高级筛选</span>
                    <button class="btn btn-sm btn-secondary" onclick="clearFilters()">清除筛选</button>
                </div>
                <div class="search-grid">
                    <div class="search-group">
                        <label class="search-label">施法时间</label>
                        <select class="search-select" id="searchCastingTime" onchange="filterSpells()">
                            <option value="">全部</option>
                            <option value="附赠动作">附赠动作</option>
                            <option value="1动作">1动作</option>
                            <option value="1分钟">1分钟</option>
                            <option value="10分钟">10分钟</option>
                            <option value="1小时">1小时</option>
                        </select>
                    </div>
                    <div class="search-group">
                        <label class="search-label">射程范围</label>
                        <select class="search-select" id="searchRange" onchange="filterSpells()">
                            <option value="">全部</option>
                            <option value="自身">自身</option>
                            <option value="接触">接触</option>
                            <option value="30">30尺</option>
                            <option value="60">60尺</option>
                            <option value="120">120尺</option>
                        </select>
                    </div>
                    <div class="search-group">
                        <label class="search-label">持续时间</label>
                        <select class="search-select" id="searchDuration" onchange="filterSpells()">

                            <option value="瞬时">瞬时</option>
                            <option value="1轮">1轮</option>
                            <option value="1分钟">1分钟</option>
                            <option value="10分钟">10分钟</option>
                            <option value="1小时">1小时</option>
                            <option value="8小时">8小时</option>
                        </select>
                    </div>
                    <div class="search-group">
                        <label class="search-label">专注</label>
                        <select class="search-select" id="searchConcentration" onchange="filterSpells()">
                            <option value="">全部</option>
                            <option value="yes">需要专注</option>
                            <option value="no">不需要专注</option>
                        </select>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 法术数据（示例数据）
        const spellsData = [
            {
                id: 1,
                name: "火球术",
                nameEn: "Fireball",
                level: 3,
                school: "塑能",
                castingTime: "1动作",
                range: "150尺",
                components: "V, S, M",
                duration: "瞬时",
                concentration: false,
                ritual: false,
                classes: ["术士", "法师"],
                description: "一个明亮的闪光从你伸出的指尖 streak 向一个你选择的点，然后爆发出火焰的轰鸣。以该点为中心，20尺半径球状区域内的每个生物都必须进行一次敏捷豁免。豁免失败者受到8d6火焰伤害，豁免成功者伤害减半。",
                higherLevels: "使用3环或更高法术位施放此法术时，你使用的法术位每比3环高1环，伤害就增加1d6。"
            },
            {
                id: 2,
                name: "魔法飞弹",
                nameEn: "Magic Missile",
                level: 1,
                school: "塑能",
                castingTime: "1动作",
                range: "120尺",
                components: "V, S",
                duration: "瞬时",
                concentration: false,
                ritual: false,
                classes: ["术士", "法师"],
                description: "你创造出三支由魔法能量构成的飞镖，每支飞镖都会击中一个由你选择的、在你射程内你能看到的生物。每支飞镖对目标造成1d4+1的力场伤害。所有的飞镖同时击中目标，你可以决定它们击中一个生物还是多个。",
                higherLevels: "使用2环或更高法术位施放此法术时，你使用的法术位每比1环高1环，法术就会多创造出两支飞镖。"
            },
            {
                id: 3,
                name: "治疗真言",
                nameEn: "Healing Word",
                level: 1,
                school: "塑能",
                castingTime: "附赠动作",
                range: "60尺",
                components: "V",
                duration: "瞬时",
                concentration: false,
                ritual: false,
                classes: ["吟游诗人", "牧师", "德鲁伊"],
                description: "一个你选择的、在你射程内你能看到的生物恢复生命值。恢复量等于1d4+你的施法属性调整值。此法术对不死生物和构装生物无效。",
                higherLevels: "使用2环或更高法术位施放此法术时，你使用的法术位每比1环高1环，治疗量就增加1d4。"
            },
            {
                id: 4,
                name: "祝福术",
                nameEn: "Bless",
                level: 1,
                school: "惑控",
                castingTime: "1动作",
                range: "30尺",
                components: "V, S, M",
                duration: "1分钟",
                concentration: true,
                ritual: false,
                classes: ["牧师", "圣武士"],
                description: "你祝福最多三个在你射程内的生物。每当目标在法术持续时间内进行攻击检定或豁免检定时，它可以投一枚d4并加上投出的数值。",
                higherLevels: "使用2环或更高法术位施放此法术时，你使用的法术位每比1环高1环，就可以多选择一个生物作为目标。"
            },
            {
                id: 5,
                name: "护盾术",
                nameEn: "Shield",
                level: 1,
                school: "防护",
                castingTime: "反应",
                range: "自身",
                components: "V, S",
                duration: "1轮",
                concentration: false,
                ritual: false,
                classes: ["术士", "法师"],
                description: "当一个生物对你发动攻击命中时，或者当你成为魔法飞弹法术的目标时，你可以施放此法术。一个隐形的力场屏障出现并保护你。直到你的下一回合开始，你的AC获得+5加值，包括对抗触发此法术的攻击，并且你不会受到魔法飞弹的伤害。"
            },
            {
                id: 6,
                name: "隐形术",
                nameEn: "Invisibility",
                level: 2,
                school: "幻术",
                castingTime: "1动作",
                range: "接触",
                components: "V, S, M",
                duration: "1小时",
                concentration: true,
                ritual: false,
                classes: ["吟游诗人", "术士", "法师", "邪术师"],
                description: "一个你触摸的生物变得隐形，直到法术结束。任何目标穿着或携带的东西只要保持在其身上就会隐形。",
                higherLevels: "使用3环或更高法术位施放此法术时，你使用的法术位每比2环高1环，就可以多选择一个生物作为目标。"
            }
        ];

        let filteredSpells = [...spellsData];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderSpells();
        });

        // 渲染法术列表
        function renderSpells() {
            const grid = document.getElementById('spellGrid');
            const count = document.getElementById('spellCount');
            
            count.textContent = filteredSpells.length;

            if (filteredSpells.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔮</div>
                        <p>没有找到匹配的法术</p>
                        <p style="font-size: var(--text-sm);">尝试调整筛选条件</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredSpells.map(spell => `
                <div class="spell-card" onclick="showSpellDetail(${spell.id})">
                    <div class="spell-header">
                        <div class="spell-title-group">
                            <div class="spell-name">${spell.name}</div>
                            <div class="spell-name-en">${spell.nameEn}</div>
                        </div>
                        <span class="spell-level-badge ${spell.level === 0 ? 'cantrip' : ''}">
                            ${spell.level === 0 ? '戏法' : spell.level + '环'}
                        </span>
                    </div>
                    <div class="spell-meta">
                        <div class="spell-meta-item">
                            <span class="spell-meta-label">学派:</span>
                            <span class="spell-school ${getSchoolClass(spell.school)}">${spell.school}</span>
                        </div>
                        <div class="spell-meta-item">
                            <span class="spell-meta-label">施法:</span>
                            <span class="spell-meta-value">${spell.castingTime}</span>
                        </div>
                        <div class="spell-meta-item">
                            <span class="spell-meta-label">射程:</span>
                            <span class="spell-meta-value">${spell.range}</span>
                        </div>
                        <div class="spell-meta-item">
                            <span class="spell-meta-label">持续:</span>
                            <span class="spell-meta-value">${spell.duration}${spell.concentration ? ' (专注)' : ''}</span>
                        </div>
                    </div>
                    <div class="spell-classes">
                        <div class="spell-classes-title">可用职业</div>
                        <div class="class-tags">
                            ${spell.classes.map(c => `<span class="class-tag">${c}</span>`).join('')}
                        </div>
                    </div>
                    <div class="spell-description">${spell.description}</div>
                </div>
            `).join('');
        }

        // 获取学派CSS类
        function getSchoolClass(school) {
            const schoolMap = {
                '防护': 'abjuration',
                '咒法': 'conjuration',
                '预言': 'divination',
                '惑控': 'enchantment',
                '塑能': 'evocation',
                '幻术': 'illusion',
                '死灵': 'necromancy',
                '变化': 'transmutation'
            };
            return schoolMap[school] || '';
        }

        // 筛选法术
        function filterSpells() {
            const name = document.getElementById('searchName').value.toLowerCase();
            const level = document.getElementById('searchLevel').value;
            const school = document.getElementById('searchSchool').value;
            const classFilter = document.getElementById('searchClass').value;
            const castingTime = document.getElementById('searchCastingTime').value;
            const range = document.getElementById('searchRange').value;
            const duration = document.getElementById('searchDuration').value;
            const concentration = document.getElementById('searchConcentration').value;

            filteredSpells = spellsData.filter(spell => {
                if (name && !spell.name.toLowerCase().includes(name) && !spell.nameEn.toLowerCase().includes(name)) return false;
                if (level !== '' && spell.level !== parseInt(level)) return false;
                if (school && spell.school !== school) return false;
                if (classFilter && !spell.classes.some(c => c.toLowerCase().includes(classFilter))) return false;
                if (castingTime && !spell.castingTime.includes(castingTime)) return false;
                if (range && !spell.range.includes(range)) return false;
                if (duration && !spell.duration.includes(duration)) return false;
                if (concentration === 'yes' && !spell.concentration) return false;
                if (concentration === 'no' && spell.concentration) return false;
                return true;
            });

            renderSpells();
        }

        // 清除筛选
        function clearFilters() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchLevel').value = '';
            document.getElementById('searchSchool').value = '';
            document.getElementById('searchClass').value = '';
            document.getElementById('searchCastingTime').value = '';
            document.getElementById('searchRange').value = '';
            document.getElementById('searchDuration').value = '';
            document.getElementById('searchConcentration').value = '';
            filteredSpells = [...spellsData];
            renderSpells();
        }

        // 显示法术详情
        function showSpellDetail(id) {
            const spell = spellsData.find(s => s.id === id);
            if (!spell) return;

            const detail = document.getElementById('spellDetail');
            detail.innerHTML = `
                <div class="spell-detail-header">
                    <div class="spell-detail-name">${spell.name}</div>
                    <div class="spell-detail-name-en">${spell.nameEn}</div>
                    <div class="spell-detail-badges">
                        <span class="detail-badge">${spell.level === 0 ? '戏法' : spell.level + '环'}</span>
                        <span class="spell-school ${getSchoolClass(spell.school)}">${spell.school}</span>
                        ${spell.concentration ? '<span class="detail-badge">专注</span>' : ''}
                        ${spell.ritual ? '<span class="detail-badge">仪式</span>' : ''}
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">法术属性</h3>
                    <div class="detail-meta-grid">
                        <div class="detail-meta-item">
                            <div class="detail-meta-label">施法时间</div>
                            <div class="detail-meta-value">${spell.castingTime}</div>
                        </div>
                        <div class="detail-meta-item">
                            <div class="detail-meta-label">射程</div>
                            <div class="detail-meta-value">${spell.range}</div>
                        </div>
                        <div class="detail-meta-item">
                            <div class="detail-meta-label">成分</div>
                            <div class="detail-meta-value">${spell.components}</div>
                        </div>
                        <div class="detail-meta-item">
                            <div class="detail-meta-label">持续时间</div>
                            <div class="detail-meta-value">${spell.duration}</div>
                        </div>
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">法术描述</h3>
                    <div class="detail-description">
                        <p>${spell.description}</p>
                        ${spell.higherLevels ? `
                            <div class="higher-level-box">
                                <div class="higher-level-title">升环施法效果</div>
                                <p>${spell.higherLevels}</p>
                            </div>
                        ` : ''}
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">可用职业</h3>
                    <div class="class-tags">
                        ${spell.classes.map(c => `<span class="class-tag">${c}</span>`).join('')}
                    </div>
                </div>
            `;

            openModal();
        }

        // 模态框控制
        function openModal() {
            document.getElementById('spellModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('spellModal').classList.remove('show');
            document.body.style.overflow = '';
        }

        // 点击模态框外部关闭
        document.getElementById('spellModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeModal();
            }
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
