<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骰子模拟器 - 阿正的赛博工具箱</title>
    <style>
        :root {
            --primary-color: #8b4513;
            --primary-dark: #5d2e0c;
            --primary-light: #d4a574;
            --secondary-color: #2c3e50;
            --accent-color: #c9a227;
            --bg-color: #f5f5dc;
            --card-bg: #fffef0;
            --text-color: #2c1810;
            --text-light: #5a4a3a;
            --border-color: #d4c5b5;
            --success-color: #27ae60;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .dice-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 2px solid var(--border-color);
        }

        .dice-title {
            text-align: center;
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 2rem;
        }

        .dice-types {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .dice-type {
            background: white;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dice-type:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .dice-type.selected {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            border-color: var(--primary-color);
        }

        .dice-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .dice-name {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .dice-count-section {
            margin-bottom: 2rem;
        }

        .section-label {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
            display: block;
        }

        .count-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .count-btn {
            width: 50px;
            height: 50px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .count-btn:hover {
            border-color: var(--primary-color);
            background: rgba(139, 69, 19, 0.1);
        }

        .count-btn.selected {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            border-color: var(--primary-color);
        }

        .roll-button {
            width: 100%;
            padding: 1rem;
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--success-color) 0%, #1e8449 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2rem;
        }

        .roll-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .roll-button:active {
            transform: translateY(0);
        }

        .results-section {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            border: 2px solid var(--border-color);
            min-height: 150px;
        }

        .results-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
            text-align: center;
        }

        .dice-results {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .dice-result {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-color) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            box-shadow: var(--shadow);
            animation: rollDice 0.5s ease-out;
        }

        @keyframes rollDice {
            0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); opacity: 1; }
        }

        .total-result {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--success-color);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed var(--border-color);
        }

        .history-section {
            margin-top: 2rem;
            background: white;
            border-radius: 8px;
            padding: 1rem;
            border: 2px solid var(--border-color);
        }

        .history-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .history-item {
            padding: 0.3rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .footer {
            background: var(--secondary-color);
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: auto;
        }

        /* 喝酒摇骰子按钮 */
        .btn-party {
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 100%);
            color: white;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 0, 110, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(255, 0, 110, 0); }
        }

        .btn-party:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        }

        /* 喝酒摇骰子模式 - 赛博夜店风 */
        .party-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        .party-container {
            width: 90%;
            max-width: 900px;
            background: linear-gradient(135deg, rgba(20, 20, 40, 0.95) 0%, rgba(30, 10, 50, 0.95) 100%);
            border-radius: 20px;
            border: 2px solid #ff006e;
            box-shadow: 
                0 0 30px rgba(255, 0, 110, 0.3),
                0 0 60px rgba(131, 56, 236, 0.2),
                inset 0 0 30px rgba(255, 0, 110, 0.1);
            padding: 2rem;
            position: relative;
            animation: partyGlow 3s ease-in-out infinite alternate;
        }

        @keyframes partyGlow {
            0% { box-shadow: 0 0 30px rgba(255, 0, 110, 0.3), 0 0 60px rgba(131, 56, 236, 0.2); }
            100% { box-shadow: 0 0 50px rgba(255, 0, 110, 0.5), 0 0 100px rgba(131, 56, 236, 0.3); }
        }

        .party-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255, 0, 110, 0.5);
        }

        .party-title {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff006e 0%, #00d4ff 50%, #8338ec 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 0, 110, 0.5);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.3); }
        }

        .party-round {
            font-size: 1.5rem;
            color: #00d4ff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }

        .party-close {
            background: rgba(255, 0, 110, 0.2);
            border: 2px solid #ff006e;
            color: #ff006e;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .party-close:hover {
            background: #ff006e;
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.8);
        }

        .party-dice-area {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .party-dice-container {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .party-dice {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 
                0 0 20px rgba(255, 0, 110, 0.5),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .party-dice::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 70%
            );
            animation: diceShine 3s infinite;
        }

        @keyframes diceShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .party-dice:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 
                0 0 40px rgba(255, 0, 110, 0.8),
                0 0 60px rgba(131, 56, 236, 0.4);
        }

        .party-dice.locked {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.8),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
        }

        .party-dice.locked::after {
            content: '🔒';
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 1rem;
        }

        .party-dice.rolling {
            animation: diceRoll 0.5s ease-in-out;
        }

        @keyframes diceRoll {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.2); }
            50% { transform: rotate(180deg) scale(0.8); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .party-controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .party-roll-btn, .party-next-btn {
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .party-roll-btn {
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 100%);
            color: white;
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.5);
        }

        .party-roll-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(255, 0, 110, 0.8);
        }

        .party-next-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .party-next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.8);
        }

        .party-status {
            text-align: center;
            font-size: 1.2rem;
            color: #00d4ff;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            min-height: 30px;
        }

        .party-pro-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-top: 1.5rem;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            border: none;
            border-radius: 10px;
            color: #1a0a2e;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .party-pro-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
        }

        .party-pro-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 技能骰样式 */
        .party-skills {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid rgba(255, 0, 110, 0.3);
        }

        .party-skills-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .party-skills-title {
            color: #ffd700;
            font-size: 1.3rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .party-close-pro {
            background: rgba(255, 0, 110, 0.3);
            border: 1px solid #ff006e;
            color: #ff006e;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .party-close-pro:hover {
            background: #ff006e;
            color: white;
        }

        /* 德州骰选择对话框 */
        .texas-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .texas-dialog-content {
            background: linear-gradient(135deg, rgba(20, 20, 40, 0.98) 0%, rgba(30, 10, 50, 0.98) 100%);
            border-radius: 20px;
            border: 2px solid #ffd700;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
        }

        .texas-dialog-content h3 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .texas-dialog-content p {
            color: #aaa;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .texas-dice-options {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .texas-dice-option {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #333 0%, #555 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }

        .texas-dice-option:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .texas-dice-option.selected {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        .texas-selected {
            text-align: center;
            color: #00d4ff;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .texas-dialog-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .party-skill-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .party-skill-item {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.2) 0%, rgba(131, 56, 236, 0.2) 100%);
            border: 2px solid rgba(255, 0, 110, 0.5);
            border-radius: 10px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .party-skill-item:hover:not(.disabled) {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.4) 0%, rgba(131, 56, 236, 0.4) 100%);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255, 0, 110, 0.4);
        }

        .party-skill-item.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .party-skill-item.used {
            opacity: 0.5;
            border-color: #666;
        }

        .party-skill-name {
            color: #ff006e;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }

        .party-skill-count {
            color: #00d4ff;
            font-size: 0.9rem;
        }

        .party-skill-desc {
            color: #aaa;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .dice-types {
                grid-template-columns: repeat(3, 1fr);
            }

            .main-content {
                padding: 1rem;
            }
            
            .party-container {
                width: 95%;
                padding: 1rem;
            }
            
            .party-title {
                font-size: 1.5rem;
            }
            
            .party-dice {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
            
            .party-skill-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🎲 骰子模拟器</h1>
        <div class="header-actions">
            <button class="btn btn-party" onclick="enterPartyMode()">🍻 喝酒摇骰子</button>
            <a href="../index.html" class="btn btn-secondary">🏠 返回首页</a>
            <a href="../dnd-character-creator/index.html" class="btn btn-secondary">🧙‍♂️ 角色卡生成器</a>
        </div>
    </header>

    <main class="main-content">
        <div class="dice-container">
            <h2 class="dice-title">选择骰子类型和数量</h2>

            <div class="dice-types">
                <div class="dice-type" data-dice="4" onclick="selectDiceType(4)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D4</div>
                </div>
                <div class="dice-type" data-dice="6" onclick="selectDiceType(6)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D6</div>
                </div>
                <div class="dice-type selected" data-dice="8" onclick="selectDiceType(8)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D8</div>
                </div>
                <div class="dice-type" data-dice="10" onclick="selectDiceType(10)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D10</div>
                </div>
                <div class="dice-type" data-dice="12" onclick="selectDiceType(12)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D12</div>
                </div>
                <div class="dice-type" data-dice="20" onclick="selectDiceType(20)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D20</div>
                </div>
                <div class="dice-type" data-dice="100" onclick="selectDiceType(100)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D100</div>
                </div>
            </div>

            <div class="dice-count-section">
                <span class="section-label">选择骰子数量</span>
                <div class="count-buttons">
                    <button class="count-btn" onclick="selectDiceCount(1)">1</button>
                    <button class="count-btn selected" onclick="selectDiceCount(2)">2</button>
                    <button class="count-btn" onclick="selectDiceCount(3)">3</button>
                    <button class="count-btn" onclick="selectDiceCount(4)">4</button>
                    <button class="count-btn" onclick="selectDiceCount(5)">5</button>
                    <button class="count-btn" onclick="selectDiceCount(6)">6</button>
                    <button class="count-btn" onclick="selectDiceCount(7)">7</button>
                    <button class="count-btn" onclick="selectDiceCount(8)">8</button>
                </div>
            </div>

            <button class="roll-button" onclick="rollDice()">🎲 掷骰子</button>

            <div class="results-section">
                <div class="results-title">掷骰结果</div>
                <div id="diceResults" class="dice-results">
                    <p style="color: var(--text-light); text-align: center; width: 100%;">点击上方按钮开始掷骰</p>
                </div>
                <div id="totalResult" class="total-result" style="display: none;"></div>
            </div>

            <div class="history-section">
                <div class="history-title">📜 历史记录</div>
                <div id="historyList" class="history-list">
                    <p style="color: var(--text-light);">暂无记录</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>🐉 阿正的赛博工具箱 - 让跑团更便捷</p>
    </footer>

    <!-- 德州骰选择对话框 -->
    <div id="texasSelectDialog" class="texas-dialog" style="display: none;">
        <div class="texas-dialog-content">
            <h3>🤠 德州骰 - 选择5个骰子</h3>
            <p>点击选择5个骰子：</p>
            <div id="texasDiceOptions" class="texas-dice-options"></div>
            <div class="texas-selected">已选择: <span id="texasSelectedCount">0</span>/5</div>
            <div class="texas-dialog-buttons">
                <button class="party-roll-btn" onclick="confirmTexasSelect()" id="texasConfirmBtn" disabled>确认选择</button>
                <button class="party-next-btn" onclick="cancelTexasSelect()">取消</button>
            </div>
        </div>
    </div>

    <!-- 喝酒摇骰子模式遮罩 -->
    <div id="partyModeOverlay" class="party-overlay" style="display: none;">
        <div class="party-container">
            <div class="party-header">
                <h2 class="party-title">🍻 喝酒摇骰子 🎲</h2>
                <div class="party-round">第 <span id="partyRound">1</span> 局</div>
                <button class="party-close" onclick="exitPartyMode()">✕</button>
            </div>
            
            <div class="party-dice-area">
                <div id="partyDiceContainer" class="party-dice-container">
                    <!-- 骰子将在这里生成 -->
                </div>
            </div>

            <div class="party-controls">
                <button id="partyRollBtn" class="party-roll-btn" onclick="partyRoll()">🎲 掷骰子</button>
                <button id="partyNextBtn" class="party-next-btn" onclick="partyNextRound()" style="display: none;">下一局 ➜</button>
            </div>

            <div class="party-status" id="partyStatus">
                点击"掷骰子"开始游戏！
            </div>

            <div class="party-skills" id="partySkills" style="display: none;">
                <div class="party-skills-header">
                    <h3 class="party-skills-title">🎮 技能骰</h3>
                    <button class="party-close-pro" onclick="exitPartyProMode()">关闭Pro模式</button>
                </div>
                <div class="party-skill-list" id="partySkillList">
                    <!-- 技能骰将在这里显示 -->
                </div>
            </div>

            <button class="party-pro-btn" id="partyProBtn" onclick="enterPartyProMode()">
                ⚡ 开启Pro模式
            </button>
        </div>
    </div>

    <script>
        let selectedDiceType = 8;
        let selectedDiceCount = 2;
        let rollHistory = [];
        
        // 喝酒摇骰子模式变量
        let partyMode = {
            active: false,
            proMode: false,
            round: 1,
            dice: [],
            locked: false,
            skills: {
                reroll: 0,
                small: 0,
                big: 0,
                texas: 0
            },
            skillHistory: []
        };

        function selectDiceType(type) {
            selectedDiceType = type;
            document.querySelectorAll('.dice-type').forEach(el => {
                el.classList.remove('selected');
            });
            document.querySelector(`[data-dice="${type}"]`).classList.add('selected');
        }

        function selectDiceCount(count) {
            selectedDiceCount = count;
            document.querySelectorAll('.count-btn').forEach(el => {
                el.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }

        function rollDice() {
            const results = [];
            let total = 0;

            for (let i = 0; i < selectedDiceCount; i++) {
                const result = Math.floor(Math.random() * selectedDiceType) + 1;
                results.push(result);
                total += result;
            }

            displayResults(results, total);
            addToHistory(results, total);
        }

        function displayResults(results, total) {
            const resultsContainer = document.getElementById('diceResults');
            const totalContainer = document.getElementById('totalResult');

            resultsContainer.innerHTML = results.map((result, index) => 
                `<div class="dice-result" style="animation-delay: ${index * 0.1}s">${result}</div>`
            ).join('');

            totalContainer.innerHTML = `总计: ${total}`;
            totalContainer.style.display = 'block';
        }

        function addToHistory(results, total) {
            const historyList = document.getElementById('historyList');
            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            rollHistory.unshift({
                time: timestamp,
                dice: `${selectedDiceCount}D${selectedDiceType}`,
                results: results,
                total: total
            });

            if (rollHistory.length > 10) {
                rollHistory.pop();
            }

            updateHistoryDisplay();
        }

        function updateHistoryDisplay() {
            const historyList = document.getElementById('historyList');
            
            if (rollHistory.length === 0) {
                historyList.innerHTML = '<p style="color: var(--text-light);">暂无记录</p>';
                return;
            }

            historyList.innerHTML = rollHistory.map(roll => 
                `<div class="history-item">
                    <strong>[${roll.time}]</strong> ${roll.dice}: [${roll.results.join(', ')}] = <strong>${roll.total}</strong>
                </div>`
            ).join('');
        }

        // ==================== 喝酒摇骰子模式 ====================
        
        function enterPartyMode() {
            partyMode.active = true;
            partyMode.proMode = false;
            partyMode.round = 1;
            partyMode.locked = false;
            partyMode.dice = [];
            partyMode.skillHistory = [];
            
            // 初始化5个d6骰子
            for (let i = 0; i < 5; i++) {
                partyMode.dice.push({
                    value: null,
                    locked: false
                });
            }
            
            document.getElementById('partyModeOverlay').style.display = 'flex';
            document.getElementById('partyRound').textContent = partyMode.round;
            document.getElementById('partyProBtn').style.display = 'block';
            document.getElementById('partyProBtn').disabled = false;
            document.getElementById('partySkills').style.display = 'none';
            
            renderPartyDice();
            updatePartyStatus('点击"掷骰子"开始游戏！');
            
            document.getElementById('partyRollBtn').style.display = 'block';
            document.getElementById('partyNextBtn').style.display = 'none';
        }
        
        function exitPartyMode() {
            partyMode.active = false;
            document.getElementById('partyModeOverlay').style.display = 'none';
        }
        
        function enterPartyProMode() {
            partyMode.proMode = true;
            partyMode.skills = {
                reroll: 1,
                small: 1,
                big: 1,
                texas: 1
            };

            document.getElementById('partyProBtn').style.display = 'none';
            document.getElementById('partySkills').style.display = 'block';

            renderPartySkills();
            updatePartyStatus('Pro模式已开启！每3局获得一个随机技能骰');
        }

        function exitPartyProMode() {
            partyMode.proMode = false;
            partyMode.skills = {
                reroll: 0,
                small: 0,
                big: 0,
                texas: 0
            };

            document.getElementById('partyProBtn').style.display = 'block';
            document.getElementById('partySkills').style.display = 'none';

            updatePartyStatus('Pro模式已关闭');
        }

        // 德州骰选择相关变量
        let texasSelection = {
            results: [],
            selected: [],
            active: false
        };

        function showTexasDialog() {
            // 生成7个d6骰子
            texasSelection.results = [];
            texasSelection.selected = [];
            texasSelection.active = true;

            for (let i = 0; i < 7; i++) {
                texasSelection.results.push(Math.floor(Math.random() * 6) + 1);
            }

            // 渲染选择界面
            const container = document.getElementById('texasDiceOptions');
            container.innerHTML = texasSelection.results.map((value, index) => `
                <div class="texas-dice-option" id="texasDie${index}" onclick="toggleTexasDie(${index})">${value}</div>
            `).join('');

            document.getElementById('texasSelectedCount').textContent = '0';
            document.getElementById('texasConfirmBtn').disabled = true;
            document.getElementById('texasSelectDialog').style.display = 'flex';
        }

        function toggleTexasDie(index) {
            if (!texasSelection.active) return;

            const dieEl = document.getElementById(`texasDie${index}`);
            const selectedIndex = texasSelection.selected.indexOf(index);

            if (selectedIndex > -1) {
                // 取消选择
                texasSelection.selected.splice(selectedIndex, 1);
                dieEl.classList.remove('selected');
            } else {
                // 选择（最多5个）
                if (texasSelection.selected.length < 5) {
                    texasSelection.selected.push(index);
                    dieEl.classList.add('selected');
                }
            }

            document.getElementById('texasSelectedCount').textContent = texasSelection.selected.length;
            document.getElementById('texasConfirmBtn').disabled = texasSelection.selected.length !== 5;
        }

        function confirmTexasSelect() {
            if (texasSelection.selected.length !== 5) return;

            // 将选中的5个骰子应用到游戏中
            for (let i = 0; i < 5; i++) {
                const selectedIndex = texasSelection.selected[i];
                partyMode.dice[i].value = texasSelection.results[selectedIndex];
                partyMode.dice[i].locked = true;
            }

            document.getElementById('texasSelectDialog').style.display = 'none';
            texasSelection.active = false;

            renderPartyDice();
            renderPartySkills();

            const values = partyMode.dice.map(d => d.value);
            updatePartyStatus(`使用德州骰！结果: [${values.join(', ')}]`);
        }

        function cancelTexasSelect() {
            document.getElementById('texasSelectDialog').style.display = 'none';
            texasSelection.active = false;
            // 返还技能骰
            partyMode.skills.texas++;
            renderPartySkills();
            updatePartyStatus('取消使用德州骰');
        }
        
        function renderPartyDice() {
            const container = document.getElementById('partyDiceContainer');
            
            container.innerHTML = partyMode.dice.map((die, index) => {
                const value = die.value || '?';
                const lockedClass = die.locked ? 'locked' : '';
                return `<div class="party-dice ${lockedClass}" id="partyDie${index}" onclick="togglePartyDieLock(${index})">${value}</div>`;
            }).join('');
        }
        
        function renderPartySkills() {
            const container = document.getElementById('partySkillList');
            
            const skills = [
                { key: 'reroll', name: '🔄 重掷骰', desc: '无视锁定重掷5个d6', count: partyMode.skills.reroll },
                { key: 'small', name: '🔹 小小骰', desc: '无视锁定重掷5个d4', count: partyMode.skills.small },
                { key: 'big', name: '🔸 大大骰', desc: '重掷5个d6，结果只可能为4/5/6', count: partyMode.skills.big },
                { key: 'texas', name: '🤠 德州骰', desc: '重掷7个d6，选择其中5个', count: partyMode.skills.texas }
            ];
            
            container.innerHTML = skills.map(skill => {
                const disabledClass = skill.count <= 0 ? 'disabled' : '';
                return `
                    <div class="party-skill-item ${disabledClass}" onclick="usePartySkill('${skill.key}')">
                        <div class="party-skill-name">${skill.name}</div>
                        <div class="party-skill-count">剩余: ${skill.count}个</div>
                        <div class="party-skill-desc">${skill.desc}</div>
                    </div>
                `;
            }).join('');
        }
        
        function partyRoll() {
            if (partyMode.locked) return;
            
            // 掷骰子
            partyMode.dice.forEach((die, index) => {
                if (!die.locked) {
                    const dieEl = document.getElementById(`partyDie${index}`);
                    dieEl.classList.add('rolling');
                    
                    setTimeout(() => {
                        die.value = Math.floor(Math.random() * 6) + 1;
                        dieEl.textContent = die.value;
                        dieEl.classList.remove('rolling');
                    }, 500);
                }
            });
            
            setTimeout(() => {
                // 检查是否五个骰子都不一样
                const values = partyMode.dice.map(d => d.value).filter(v => v !== null);
                const uniqueValues = [...new Set(values)];
                
                if (values.length === 5 && uniqueValues.length === 5) {
                    updatePartyStatus('五个骰子都不一样！自动重新掷骰子...');
                    setTimeout(() => partyRoll(), 1000);
                    return;
                }
                
                // 锁定骰子
                partyMode.locked = true;
                partyMode.dice.forEach(die => die.locked = true);
                renderPartyDice();
                
                // 显示下一局按钮
                document.getElementById('partyRollBtn').style.display = 'none';
                document.getElementById('partyNextBtn').style.display = 'block';
                
                updatePartyStatus(`第${partyMode.round}局完成！五个骰子: [${values.join(', ')}]`);
                
                // 检查是否需要奖励技能骰（每3局）
                if (partyMode.proMode && partyMode.round % 3 === 0) {
                    awardRandomSkill();
                }
            }, 600);
        }
        
        function partyNextRound() {
            partyMode.round++;
            partyMode.locked = false;
            
            // 解锁骰子但保留值
            partyMode.dice.forEach(die => {
                die.locked = false;
            });
            
            document.getElementById('partyRound').textContent = partyMode.round;
            document.getElementById('partyRollBtn').style.display = 'block';
            document.getElementById('partyNextBtn').style.display = 'none';
            
            renderPartyDice();
            updatePartyStatus(`第${partyMode.round}局开始！点击"掷骰子"`);
        }
        
        function togglePartyDieLock(index) {
            if (!partyMode.locked) return; // 只有在锁定状态下才能切换
            
            partyMode.dice[index].locked = !partyMode.dice[index].locked;
            renderPartyDice();
        }
        
        function usePartySkill(skillKey) {
            if (partyMode.skills[skillKey] <= 0) return;
            
            partyMode.skills[skillKey]--;
            
            switch(skillKey) {
                case 'reroll':
                    // 重掷骰：无视锁定重掷5个d6
                    partyMode.dice.forEach((die, index) => {
                        die.value = Math.floor(Math.random() * 6) + 1;
                        die.locked = true;
                    });
                    break;
                    
                case 'small':
                    // 小小骰：无视锁定重掷5个d4
                    partyMode.dice.forEach((die, index) => {
                        die.value = Math.floor(Math.random() * 4) + 1;
                        die.locked = true;
                    });
                    break;
                    
                case 'big':
                    // 大大骰：重掷5个d6，结果只可能为4/5/6
                    partyMode.dice.forEach((die, index) => {
                        die.value = Math.floor(Math.random() * 3) + 4; // 4, 5, 或 6
                        die.locked = true;
                    });
                    break;
                    
                case 'texas':
                    // 德州骰：显示选择对话框让玩家自选5个
                    showTexasDialog();
                    return; // 不执行后续的render和update
            }
            
            renderPartyDice();
            renderPartySkills();
            
            const values = partyMode.dice.map(d => d.value);
            updatePartyStatus(`使用技能骰！结果: [${values.join(', ')}]`);
        }
        
        function awardRandomSkill() {
            const skillKeys = ['reroll', 'small', 'big', 'texas'];
            const randomSkill = skillKeys[Math.floor(Math.random() * skillKeys.length)];
            partyMode.skills[randomSkill]++;
            
            renderPartySkills();
            
            const skillNames = {
                reroll: '重掷骰',
                small: '小小骰',
                big: '大大骰',
                texas: '德州骰'
            };
            
            updatePartyStatus(`🎉 第${partyMode.round}局奖励！获得1个${skillNames[randomSkill]}！`);
        }
        
        function updatePartyStatus(message) {
            document.getElementById('partyStatus').textContent = message;
        }
    </script>
</body>
</html>
