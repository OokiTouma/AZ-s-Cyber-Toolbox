<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿正的赛博工具箱</title>
    <style>
        :root {
            --primary-color: #8b4513;
            --primary-dark: #5d2e0c;
            --primary-light: #d4a574;
            --secondary-color: #2c3e50;
            --accent-color: #c9a227;
            --bg-color: #f5f5dc;
            --card-bg: #fffef0;
            --text-color: #2c1810;
            --text-light: #5a4a3a;
            --border-color: #d4c5b5;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .tool-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 2px solid var(--border-color);
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-color);
        }

        .tool-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .tool-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .tool-description {
            font-size: 1rem;
            color: var(--text-light);
            line-height: 1.5;
        }

        .tool-status {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-ready {
            background: rgba(39, 174, 96, 0.2);
            color: #27ae60;
        }

        .status-new {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .footer {
            background: var(--secondary-color);
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: auto;
        }

        .footer p {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .tools-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🎲 阿正的赛博工具箱</h1>
        <p>D&D 5E 跑团辅助工具集合</p>
    </header>

    <main class="main-content">
        <div class="tools-grid">
            <!-- D&D 5E 角色卡生成器 -->
            <a href="./dnd-character-creator/index.html" class="tool-card">
                <div class="tool-icon">🧙‍♂️</div>
                <div class="tool-title">D&D 5E 角色卡生成器</div>
                <div class="tool-description">
                    完整的角色创建工具，支持种族、职业、子职业、法术、装备等全方位定制
                </div>
                <span class="tool-status status-ready">已就绪</span>
            </a>

            <!-- 骰子模拟器 -->
            <a href="./dice-simulator/index.html" class="tool-card">
                <div class="tool-icon">🎲</div>
                <div class="tool-title">骰子模拟器</div>
                <div class="tool-description">
                    支持D4、D6、D8、D10、D12、D20、D100多种骰子，可同时投掷1-8个骰子
                </div>
                <span class="tool-status status-new">新功能</span>
            </a>

            <!-- 占位：未来功能 -->
            <div class="tool-card" style="opacity: 0.6; cursor: not-allowed;">
                <div class="tool-icon">📖</div>
                <div class="tool-title">法术速查</div>
                <div class="tool-description">
                    快速查询D&D 5E所有法术信息（开发中）
                </div>
                <span class="tool-status" style="background: rgba(149, 165, 166, 0.2); color: #7f8c8d;">开发中</span>
            </div>

            <!-- 占位：未来功能 -->
            <div class="tool-card" style="opacity: 0.6; cursor: not-allowed;">
                <div class="tool-icon">⚔️</div>
                <div class="tool-title">战斗追踪器</div>
                <div class="tool-description">
                    追踪战斗回合、生命值、状态效果（开发中）
                </div>
                <span class="tool-status" style="background: rgba(149, 165, 166, 0.2); color: #7f8c8d;">开发中</span>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>🐉 阿正的赛博工具箱 - 让跑团更便捷</p>
    </footer>
</body>
</html>
