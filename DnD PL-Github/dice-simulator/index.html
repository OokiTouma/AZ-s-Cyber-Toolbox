<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骰子模拟器 - 阿正的赛博工具箱</title>
    <style>
        :root {
            --primary-color: #8b4513;
            --primary-dark: #5d2e0c;
            --primary-light: #d4a574;
            --secondary-color: #2c3e50;
            --accent-color: #c9a227;
            --bg-color: #f5f5dc;
            --card-bg: #fffef0;
            --text-color: #2c1810;
            --text-light: #5a4a3a;
            --border-color: #d4c5b5;
            --success-color: #27ae60;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .dice-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 2px solid var(--border-color);
        }

        .dice-title {
            text-align: center;
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 2rem;
        }

        .dice-types {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .dice-type {
            background: white;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dice-type:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .dice-type.selected {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            border-color: var(--primary-color);
        }

        .dice-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .dice-name {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .dice-count-section {
            margin-bottom: 2rem;
        }

        .section-label {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
            display: block;
        }

        .count-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .count-btn {
            width: 50px;
            height: 50px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .count-btn:hover {
            border-color: var(--primary-color);
            background: rgba(139, 69, 19, 0.1);
        }

        .count-btn.selected {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            border-color: var(--primary-color);
        }

        .roll-button {
            width: 100%;
            padding: 1rem;
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--success-color) 0%, #1e8449 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2rem;
        }

        .roll-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .roll-button:active {
            transform: translateY(0);
        }

        .results-section {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            border: 2px solid var(--border-color);
            min-height: 150px;
        }

        .results-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 1rem;
            text-align: center;
        }

        .dice-results {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .dice-result {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-color) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            box-shadow: var(--shadow);
            animation: rollDice 0.5s ease-out;
        }

        @keyframes rollDice {
            0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); opacity: 1; }
        }

        .total-result {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--success-color);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed var(--border-color);
        }

        .history-section {
            margin-top: 2rem;
            background: white;
            border-radius: 8px;
            padding: 1rem;
            border: 2px solid var(--border-color);
        }

        .history-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .history-item {
            padding: 0.3rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .footer {
            background: var(--secondary-color);
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .dice-types {
                grid-template-columns: repeat(3, 1fr);
            }

            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🎲 骰子模拟器</h1>
        <div class="header-actions">
            <a href="../index.html" class="btn btn-secondary">🏠 返回首页</a>
            <a href="../dnd-character-creator/index.html" class="btn btn-secondary">🧙‍♂️ 角色卡生成器</a>
        </div>
    </header>

    <main class="main-content">
        <div class="dice-container">
            <h2 class="dice-title">选择骰子类型和数量</h2>

            <div class="dice-types">
                <div class="dice-type" data-dice="4" onclick="selectDiceType(4)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D4</div>
                </div>
                <div class="dice-type" data-dice="6" onclick="selectDiceType(6)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D6</div>
                </div>
                <div class="dice-type selected" data-dice="8" onclick="selectDiceType(8)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D8</div>
                </div>
                <div class="dice-type" data-dice="10" onclick="selectDiceType(10)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D10</div>
                </div>
                <div class="dice-type" data-dice="12" onclick="selectDiceType(12)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D12</div>
                </div>
                <div class="dice-type" data-dice="20" onclick="selectDiceType(20)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D20</div>
                </div>
                <div class="dice-type" data-dice="100" onclick="selectDiceType(100)">
                    <div class="dice-icon">🎲</div>
                    <div class="dice-name">D100</div>
                </div>
            </div>

            <div class="dice-count-section">
                <span class="section-label">选择骰子数量</span>
                <div class="count-buttons">
                    <button class="count-btn" onclick="selectDiceCount(1)">1</button>
                    <button class="count-btn selected" onclick="selectDiceCount(2)">2</button>
                    <button class="count-btn" onclick="selectDiceCount(3)">3</button>
                    <button class="count-btn" onclick="selectDiceCount(4)">4</button>
                    <button class="count-btn" onclick="selectDiceCount(5)">5</button>
                    <button class="count-btn" onclick="selectDiceCount(6)">6</button>
                    <button class="count-btn" onclick="selectDiceCount(7)">7</button>
                    <button class="count-btn" onclick="selectDiceCount(8)">8</button>
                </div>
            </div>

            <button class="roll-button" onclick="rollDice()">🎲 掷骰子</button>

            <div class="results-section">
                <div class="results-title">掷骰结果</div>
                <div id="diceResults" class="dice-results">
                    <p style="color: var(--text-light); text-align: center; width: 100%;">点击上方按钮开始掷骰</p>
                </div>
                <div id="totalResult" class="total-result" style="display: none;"></div>
            </div>

            <div class="history-section">
                <div class="history-title">📜 历史记录</div>
                <div id="historyList" class="history-list">
                    <p style="color: var(--text-light);">暂无记录</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>🐉 阿正的赛博工具箱 - 让跑团更便捷</p>
    </footer>

    <script>
        let selectedDiceType = 8;
        let selectedDiceCount = 2;
        let rollHistory = [];

        function selectDiceType(type) {
            selectedDiceType = type;
            document.querySelectorAll('.dice-type').forEach(el => {
                el.classList.remove('selected');
            });
            document.querySelector(`[data-dice="${type}"]`).classList.add('selected');
        }

        function selectDiceCount(count) {
            selectedDiceCount = count;
            document.querySelectorAll('.count-btn').forEach(el => {
                el.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }

        function rollDice() {
            const results = [];
            let total = 0;

            for (let i = 0; i < selectedDiceCount; i++) {
                const result = Math.floor(Math.random() * selectedDiceType) + 1;
                results.push(result);
                total += result;
            }

            displayResults(results, total);
            addToHistory(results, total);
        }

        function displayResults(results, total) {
            const resultsContainer = document.getElementById('diceResults');
            const totalContainer = document.getElementById('totalResult');

            resultsContainer.innerHTML = results.map((result, index) => 
                `<div class="dice-result" style="animation-delay: ${index * 0.1}s">${result}</div>`
            ).join('');

            totalContainer.innerHTML = `总计: ${total}`;
            totalContainer.style.display = 'block';
        }

        function addToHistory(results, total) {
            const historyList = document.getElementById('historyList');
            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            rollHistory.unshift({
                time: timestamp,
                dice: `${selectedDiceCount}D${selectedDiceType}`,
                results: results,
                total: total
            });

            if (rollHistory.length > 10) {
                rollHistory.pop();
            }

            updateHistoryDisplay();
        }

        function updateHistoryDisplay() {
            const historyList = document.getElementById('historyList');
            
            if (rollHistory.length === 0) {
                historyList.innerHTML = '<p style="color: var(--text-light);">暂无记录</p>';
                return;
            }

            historyList.innerHTML = rollHistory.map(roll => 
                `<div class="history-item">
                    <strong>[${roll.time}]</strong> ${roll.dice}: [${roll.results.join(', ')}] = <strong>${roll.total}</strong>
                </div>`
            ).join('');
        }
    </script>
</body>
</html>
