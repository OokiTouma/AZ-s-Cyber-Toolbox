        let currentMonsterCategory = 'basic';

        function nextCombatantId() {
            combatantIdSeed += 1;
            return combatantIdSeed;
        }

        function getMonsterQuantity() {
            const quantityInput = document.getElementById('monsterQuantity');
            const parsedValue = Number.parseInt(quantityInput?.value, 10);
            const safeValue = Math.min(20, Math.max(1, Number.isFinite(parsedValue) ? parsedValue : 1));

            if (quantityInput) {
                quantityInput.value = safeValue;
            }

            return safeValue;
        }

        function summarizeMonsterAttacks(monster, limit = 2) {
            if (!monster || !Array.isArray(monster.actions)) {
                return [];
            }

            return monster.actions
                .filter(action => action && (action.attack || action.damage || action.hit || action.description))
                .slice(0, limit)
                .map(action => {
                    const parts = [action.name].filter(Boolean);

                    if (action.attack) {
                        parts.push(action.attack);
                    }

                    if (action.damage) {
                        parts.push(action.damage);
                    } else if (action.hit) {
                        parts.push(action.hit);
                    } else if (action.description) {
                        parts.push(action.description);
                    }

                    return parts.join(' · ');
                });
        }

        function getMonsterAttackSummary(monster) {
            const attacks = summarizeMonsterAttacks(monster);
            return attacks.length > 0 ? attacks.join(' / ') : '暂无攻击信息';
        }

        function normalizeMonsterRecord(id, monster, sourceLabel) {
            return {
                id,
                name: monster.name,
                hp: monster.hp,
                maxHp: monster.maxHp,
                ac: monster.ac,
                initiative: monster.initiative || 0,
                cr: monster.cr,
                type: monster.type,
                sourceLabel,
                attackSummary: getMonsterAttackSummary(monster)
            };
        }

        function mergeUniqueMonsters(target, additions) {
            const seenIds = new Set(target.map(monster => monster.id));

            additions.forEach(monster => {
                if (seenIds.has(monster.id)) {
                    return;
                }

                seenIds.add(monster.id);
                target.push(monster);
            });

            return target;
        }

        function mapMonsterSet(monsterSet, sourceLabel) {
            return Object.entries(monsterSet || {}).map(([id, monster]) => normalizeMonsterRecord(id, monster, sourceLabel));
        }

        function createMonsterCombatant(monsterData, sequence = 0, total = 1) {
            const attackSummary = getMonsterAttackSummary(monsterData);

            return {
                id: nextCombatantId(),
                name: total > 1 ? `${monsterData.name} ${sequence + 1}` : monsterData.name,
                type: 'enemy',
                initiative: rollInitiative(monsterData.initiative || 0),
                hp: monsterData.hp,
                maxHp: monsterData.maxHp ?? monsterData.hp,
                ac: monsterData.ac ?? 10,
                notes: monsterData.notes || '',
                attackSummary,
                conditions: []
            };
        }

        function rollInitiative(modifier = 0) {
            return Math.floor(Math.random() * 20) + 1 + (Number(modifier) || 0);
        }

        function trackToolUsage(toolId, toolName) {
            const usageMap = JSON.parse(localStorage.getItem('toolUsageStats') || '{}');
            usageMap[toolId] = (usageMap[toolId] || 0) + 1;
            localStorage.setItem('toolUsageStats', JSON.stringify(usageMap));

            const recentTools = JSON.parse(localStorage.getItem('recentTools') || '[]')
                .filter(item => item.id !== toolId);

            recentTools.unshift({ id: toolId, name: toolName, href: 'combat-tracker/index.html', timestamp: Date.now() });
            localStorage.setItem('recentTools', JSON.stringify(recentTools.slice(0, 5)));
        }

        function checkForDMAssistantTransfer() {
            const rawTransfer = localStorage.getItem(DM_TRANSFER_KEY);
            if (!rawTransfer) return;

            try {
                const transfer = JSON.parse(rawTransfer);
                const isFresh = transfer.timestamp && (Date.now() - transfer.timestamp < 60000);
                if (!isFresh || transfer.source !== 'dm-assistant' || !transfer.encounter) {
                    localStorage.removeItem(DM_TRANSFER_KEY);
                    return;
                }

                if (combatants.length > 0 && !confirm('检测到来自 DM Assistant 的遭遇数据。导入将清空当前战斗列表，是否继续？')) {
                    return;
                }

                importEncounterFromDMAssistant(transfer.encounter);
                localStorage.removeItem(DM_TRANSFER_KEY);
            } catch (error) {
                console.error('Failed to import DM Assistant transfer:', error);
                localStorage.removeItem(DM_TRANSFER_KEY);
            }
        }

        // 存储待处理的遭遇数据
        let pendingEncounter = null;
        let pendingPlayers = [];

        function importEncounterFromDMAssistant(encounter) {
            const players = Array.isArray(encounter.players) ? encounter.players : [];
            const enemies = Array.isArray(encounter.combatants) ? encounter.combatants : [];

            // 解析攻击信息从 notes
            function parseAttackSummary(notes) {
                if (!notes) return '';
                const attackMatch = notes.match(/攻击：(.+?)(?:\n|$)/);
                return attackMatch ? attackMatch[1].trim() : '';
            }

            // 解析特性信息
            function parseFeatures(notes) {
                if (!notes) return '';
                const featureMatch = notes.match(/特性：(.+?)(?:\n|$)/);
                return featureMatch ? featureMatch[1].trim() : '';
            }

            // 处理敌人数据
            const processedEnemies = enemies.map((combatant, index) => {
                const notes = combatant.notes || '';
                const attackSummary = parseAttackSummary(notes);
                const features = parseFeatures(notes);

                let enhancedAttackSummary = attackSummary;
                if (features && !attackSummary.includes(features)) {
                    enhancedAttackSummary = attackSummary
                        ? `${attackSummary} | ${features}`
                        : features;
                }

                return {
                    id: nextCombatantId(),
                    name: combatant.name || `敌人 ${index + 1}`,
                    type: 'enemy',
                    initiative: Number(combatant.initiative) || 0,
                    hp: Number(combatant.hp) || 0,
                    maxHp: Number(combatant.maxHp) || Number(combatant.hp) || 0,
                    ac: Number(combatant.ac) || 10,
                    notes: notes,
                    attackSummary: enhancedAttackSummary,
                    conditions: combatant.conditions || []
                };
            });

            // 处理玩家数据
            const processedPlayers = players.map((player, index) => {
                const notes = player.notes || '';
                return {
                    id: nextCombatantId(),
                    name: player.name || `玩家 ${index + 1}`,
                    type: 'player',
                    initiative: Number(player.initiative) || 0,
                    hp: Number(player.hp) || 0,
                    maxHp: Number(player.maxHp) || Number(player.hp) || 0,
                    ac: Number(player.ac) || 10,
                    notes: notes,
                    attackSummary: '',
                    conditions: player.conditions || [],
                    needsPlayerInput: player.needsPlayerInput || false
                };
            });

            // 检查是否需要弹窗填写玩家先攻
            const needsPlayerInput = encounter.options?.autoInitiative && 
                processedPlayers.some(p => p.needsPlayerInput && p.initiative === 0);

            if (needsPlayerInput) {
                // 保存数据，等待玩家填写先攻
                pendingEncounter = {
                    ...encounter,
                    processedEnemies,
                    processedPlayers
                };
                pendingPlayers = processedPlayers.filter(p => p.needsPlayerInput && p.initiative === 0);
                
                // 先导入敌人
                combatants = [...processedEnemies];
                currentTurn = 0;
                currentRound = 1;
                
                // 显示玩家先攻填写弹窗
                openPlayerInitiativeModal(encounter.name || '未命名遭遇', pendingPlayers);
            } else {
                // 不需要弹窗，直接导入所有单位
                combatants = [...processedPlayers, ...processedEnemies];
                currentTurn = 0;
                currentRound = 1;

                if (encounter.options?.autoInitiative) {
                    sortByInitiative();
                } else {
                    renderCombatants();
                }

                showNotification(`已导入 DM 遭遇：${encounter.name || '未命名遭遇'}`);
            }
        }

        // 打开玩家先攻填写弹窗
        function openPlayerInitiativeModal(encounterName, players) {
            document.getElementById('encounterName').textContent = encounterName;
            const listContainer = document.getElementById('playerInitiativeList');
            
            listContainer.innerHTML = players.map((player, index) => `
                <div class="player-initiative-item" data-player-id="${player.id}" data-index="${index}">
                    <div class="player-info">
                        <div class="player-name">
                            <span class="player-icon">🧙</span>
                            ${escapeHtml(player.name)}
                        </div>
                        <div class="player-meta">
                            <span>❤️ HP: ${player.hp || '?'}</span>
                            <span>🛡️ AC: ${player.ac || '?'}</span>
                        </div>
                    </div>
                    <div class="initiative-input-group">
                        <div class="initiative-input-wrapper">
                            <input type="number" 
                                   class="initiative-input" 
                                   id="initiative-${player.id}"
                                   placeholder="?"
                                   min="1"
                                   max="40"
                                   onfocus="focusPlayerItem(${player.id})"
                                   onblur="blurPlayerItem(${player.id})"
                                   onkeydown="handleInitiativeKeydown(event, ${index}, ${players.length})">
                        </div>
                        <button class="roll-btn" onclick="rollPlayerInitiative(${player.id})" title="随机骰先攻 (d20)">
                            🎲
                        </button>
                    </div>
                </div>
            `).join('');
            
            // 显示弹窗
            document.getElementById('playerInitiativeModal').classList.add('show');
            
            // 聚焦第一个输入框
            setTimeout(() => {
                const firstInput = document.querySelector('.player-initiative-item input');
                if (firstInput) firstInput.focus();
            }, 100);
        }

        // 关闭玩家先攻弹窗
        function closePlayerInitiativeModal() {
            document.getElementById('playerInitiativeModal').classList.remove('show');
            pendingEncounter = null;
            pendingPlayers = [];
        }

        // 聚焦玩家项
        function focusPlayerItem(playerId) {
            const item = document.querySelector(`.player-initiative-item[data-player-id="${playerId}"]`);
            if (item) item.classList.add('focused');
        }

        // 失焦玩家项
        function blurPlayerItem(playerId) {
            const item = document.querySelector(`.player-initiative-item[data-player-id="${playerId}"]`);
            if (item) item.classList.remove('focused');
        }

        // 随机骰玩家先攻
        function rollPlayerInitiative(playerId) {
            const input = document.getElementById(`initiative-${playerId}`);
            const btn = input.closest('.initiative-input-group').querySelector('.roll-btn');
            
            // 添加旋转动画
            btn.classList.add('spinning');
            
            // 模拟骰子滚动效果
            let rolls = 0;
            const maxRolls = 8;
            const interval = setInterval(() => {
                input.value = Math.floor(Math.random() * 20) + 1;
                rolls++;
                
                if (rolls >= maxRolls) {
                    clearInterval(interval);
                    const finalValue = Math.floor(Math.random() * 20) + 1;
                    input.value = finalValue;
                    btn.classList.remove('spinning');
                    
                    // 自动聚焦下一个输入框
                    const currentItem = input.closest('.player-initiative-item');
                    const nextItem = currentItem.nextElementSibling;
                    if (nextItem) {
                        const nextInput = nextItem.querySelector('input');
                        if (nextInput) nextInput.focus();
                    }
                }
            }, 80);
        }

        // 处理键盘导航
        function handleInitiativeKeydown(event, currentIndex, totalCount) {
            if (event.key === 'Enter') {
                event.preventDefault();
                if (currentIndex < totalCount - 1) {
                    // 聚焦下一个
                    const nextInput = document.querySelector(`.player-initiative-item[data-index="${currentIndex + 1}"] input`);
                    if (nextInput) nextInput.focus();
                } else {
                    // 最后一个，确认
                    confirmPlayerInitiatives();
                }
            } else if (event.key === 'ArrowUp' && currentIndex > 0) {
                event.preventDefault();
                const prevInput = document.querySelector(`.player-initiative-item[data-index="${currentIndex - 1}"] input`);
                if (prevInput) prevInput.focus();
            } else if (event.key === 'ArrowDown' && currentIndex < totalCount - 1) {
                event.preventDefault();
                const nextInput = document.querySelector(`.player-initiative-item[data-index="${currentIndex + 1}"] input`);
                if (nextInput) nextInput.focus();
            }
        }

        // 确认玩家先攻
        function confirmPlayerInitiatives() {
            if (!pendingEncounter) return;
            
            // 收集所有玩家先攻值
            const playerInitiatives = {};
            let hasEmpty = false;
            
            pendingPlayers.forEach(player => {
                const input = document.getElementById(`initiative-${player.id}`);
                const value = parseInt(input.value);
                
                if (isNaN(value) || value < 1) {
                    hasEmpty = true;
                    input.style.borderColor = '#ff4757';
                    setTimeout(() => {
                        input.style.borderColor = '';
                    }, 1000);
                } else {
                    playerInitiatives[player.id] = value;
                }
            });
            
            if (hasEmpty) {
                showNotification('请为所有玩家填写先攻值', 'error');
                return;
            }
            
            // 更新玩家数据
            const finalPlayers = pendingEncounter.processedPlayers.map(player => ({
                ...player,
                initiative: playerInitiatives[player.id] || player.initiative
            }));
            
            // 合并所有战斗单位
            combatants = [...finalPlayers, ...pendingEncounter.processedEnemies];
            
            // 关闭弹窗
            closePlayerInitiativeModal();
            
            // 按先攻排序
            sortByInitiative();
            
            showNotification('战斗开始！已按先攻排序', 'success');
        }

        // 从 monsters_data.js 转换怪物数据
        function convertMonsterData() {
            const converted = { basic: [], phandelver: [], expanded: [], extended: [], dragons: [] };

            if (typeof MONSTERS_DATA !== 'undefined') {
                mergeUniqueMonsters(converted.basic, mapMonsterSet(MONSTERS_DATA.basics?.monsters, '官方基础规则'));
                mergeUniqueMonsters(converted.phandelver, mapMonsterSet(MONSTERS_DATA.phandelver?.monsters, '凡达林官方模组'));
                mergeUniqueMonsters(converted.expanded, mapMonsterSet(MONSTERS_DATA.expanded?.monsters, '官方扩展规则'));
            }

            if (typeof MONSTERS_DATA_EXTENDED !== 'undefined') {
                mergeUniqueMonsters(converted.extended, mapMonsterSet(MONSTERS_DATA_EXTENDED.basics?.monsters, '扩展基础规则'));
                mergeUniqueMonsters(converted.extended, mapMonsterSet(MONSTERS_DATA_EXTENDED.phandelver?.monsters, '凡达林扩展'));
                mergeUniqueMonsters(converted.dragons, mapMonsterSet(MONSTERS_DATA_EXTENDED.dragons?.monsters, '龙类扩展'));
            }

            return converted;
        }

        let monsters = convertMonsterData();

        if (monsters.basic.length === 0) {
            monsters = {
                basic: [
                    { id: 'goblin_fallback', name: '地精', hp: 7, maxHp: 7, ac: 15, initiative: 2, attackSummary: '弯刀 · +4 · 1d6+2 挥砍', sourceLabel: '示例数据' },
                    { id: 'orc_fallback', name: '兽人', hp: 15, maxHp: 15, ac: 13, initiative: 1, attackSummary: '巨斧 · +5 · 1d12+3 挥砍', sourceLabel: '示例数据' },
                    { id: 'skeleton_fallback', name: '骷髅', hp: 13, maxHp: 13, ac: 13, initiative: 2, attackSummary: '短剑 · +4 · 1d6+2 穿刺', sourceLabel: '示例数据' }
                ],
                phandelver: [
                    { id: 'klarg_fallback', name: '克拉格', hp: 27, maxHp: 27, ac: 15, initiative: 1, attackSummary: '巨棒 · +6 · 2d8+4 钝击', sourceLabel: '示例数据' }
                ],
                expanded: [],
                extended: [],
                dragons: []
            };
        }

        // 添加战斗单位
        function addCombatant(event) {
            event.preventDefault();
            
            const name = document.getElementById('unitName').value;
            const type = document.getElementById('unitType').value;
            const initiative = parseInt(document.getElementById('unitInitiative').value) || 0;
            const hp = parseInt(document.getElementById('unitHP').value) || 0;
            const maxHp = parseInt(document.getElementById('unitMaxHP').value) || hp;
            const ac = parseInt(document.getElementById('unitAC').value) || 10;

            const combatant = {
                id: nextCombatantId(),
                name,
                type,
                initiative,
                hp,
                maxHp,
                ac,
                conditions: []
            };

            combatants.push(combatant);
            renderCombatants();
            
            document.getElementById('unitName').value = '';
            document.getElementById('unitInitiative').value = '';
            document.getElementById('unitHP').value = '';
            document.getElementById('unitMaxHP').value = '';
            document.getElementById('unitAC').value = '';
        }

        // 渲染战斗单位列表
        function renderCombatants() {
            const list = document.getElementById('combatantList');
            
            if (combatants.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚔️</div>
                        <p>暂无战斗单位</p>
                        <p style="font-size: var(--text-sm);">添加单位开始战斗追踪</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = combatants.map((c, index) => {
                const isActive = index === currentTurn;
                const hpPercent = c.maxHp > 0 ? (c.hp / c.maxHp) * 100 : 0;
                let hpClass = 'high';
                if (hpPercent <= 25) hpClass = 'low';
                else if (hpPercent <= 50) hpClass = 'medium';

                const typeLabels = { player: '玩家', enemy: '敌人', npc: 'NPC' };
                const attackSummary = c.attackSummary ? `
                    <div class="combatant-attack-summary">
                        <span class="combatant-attack-label">攻击</span>
                        <span>${c.attackSummary}</span>
                    </div>
                ` : '';
                const conditions = Array.isArray(c.conditions) ? c.conditions : [];

                const isHighInitiative = c.initiative >= 15;
                const isLowInitiative = c.initiative <= 5;
                const dataAttrs = isHighInitiative ? 'data-value-high="true"' : isLowInitiative ? 'data-value-low="true"' : '';

                return `
                    <div class="combatant-card ${isActive ? 'active-turn' : ''}" data-id="${c.id}">
                        <div class="initiative-badge">
                            <span class="label">INIT</span>
                            <div class="initiative-editor">
                                <button class="initiative-btn" onclick="adjustInitiative(${c.id}, -1)" title="减少先攻">−</button>
                                <input type="number" class="initiative-input" value="${c.initiative}"
                                       ${dataAttrs}
                                       onchange="updateInitiative(${c.id}, this.value)"
                                       onkeydown="handleInitiativeKeydown(event, ${c.id})"
                                       title="点击修改先攻值">
                                <button class="initiative-btn" onclick="adjustInitiative(${c.id}, 1)" title="增加先攻">+</button>
                            </div>
                        </div>
                        <div class="combatant-info">
                            <div class="combatant-name">${c.name}</div>
                            <div class="combatant-type ${c.type}">${typeLabels[c.type] || '单位'}</div>
                            ${attackSummary}
                            ${conditions.length > 0 ? `
                                <div class="conditions-list">
                                    ${conditions.map(cond => {
                                        const def = CONDITION_DEFINITIONS[cond] || { name: cond, type: 'neutral', icon: '⚪', desc: '未知状态', effect: '效果未知' };
                                        return `
                                            <span class="condition-tag ${def.type}" onclick="removeCondition(${c.id}, '${cond}')">
                                                <span class="icon">${def.icon}</span>
                                                <span>${def.name}</span>
                                                <div class="condition-tooltip">
                                                    <div class="tooltip-title">
                                                        <span>${def.icon}</span>
                                                        <span>${def.name}</span>
                                                        <span class="tooltip-type ${def.type}">${def.type}</span>
                                                    </div>
                                                    <div class="tooltip-desc">${def.desc}</div>
                                                    <div class="tooltip-effect">效果: ${def.effect}</div>
                                                </div>
                                            </span>
                                        `;
                                    }).join('')}
                                </div>
                            ` : ''}
                        </div>
                        <div class="combatant-stats">
                            <div class="stat-box">
                                <span class="label">AC</span>
                                <span class="value">${c.ac}</span>
                            </div>
                            <div class="stat-box">
                                <span class="label">HP</span>
                                <span class="value">${c.hp}/${c.maxHp}</span>
                                <div class="hp-bar-container">
                                    <div class="hp-bar ${hpClass}" style="width: ${Math.max(0, Math.min(100, hpPercent))}%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="combatant-actions">
                            <button class="action-btn damage" onclick="openHPModal(${c.id}, 'damage')" title="伤害">⚔️</button>
                            <button class="action-btn heal" onclick="openHPModal(${c.id}, 'heal')" title="治疗">💚</button>
                            <button class="action-btn condition" onclick="openConditionModal(${c.id})" title="状态">✨</button>
                            <button class="action-btn delete" onclick="deleteCombatant(${c.id})" title="删除">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 下一回合
        function nextTurn() {
            if (combatants.length === 0) return;
            
            currentTurn++;
            if (currentTurn >= combatants.length) {
                currentTurn = 0;
                currentRound++;
                document.getElementById('roundNumber').textContent = currentRound;
            }
            renderCombatants();
        }

        // 上一回合
        function prevTurn() {
            if (combatants.length === 0) return;
            
            currentTurn--;
            if (currentTurn < 0) {
                if (currentRound > 1) {
                    currentRound--;
                    document.getElementById('roundNumber').textContent = currentRound;
                    currentTurn = combatants.length - 1;
                } else {
                    currentTurn = 0;
                }
            }
            renderCombatants();
        }

        // 重置战斗
        function resetCombat() {
            if (!confirm('确定要重置战斗吗？所有数据将被清空。')) return;
            combatants = [];
            currentTurn = 0;
            currentRound = 1;
            document.getElementById('roundNumber').textContent = currentRound;
            renderCombatants();
        }

        // 清空全部
        function clearAll() {
            if (!confirm('确定要清空所有战斗单位吗？')) return;
            combatants = [];
            currentTurn = 0;
            renderCombatants();
        }

        // 删除单位
        function deleteCombatant(id) {
            combatants = combatants.filter(c => c.id !== id);
            if (currentTurn >= combatants.length) {
                currentTurn = Math.max(0, combatants.length - 1);
            }
            renderCombatants();
        }

        // 按先攻排序
        function sortByInitiative() {
            combatants.sort((a, b) => b.initiative - a.initiative);
            currentTurn = 0;
            renderCombatants();
        }

        // 调整先攻值（+/- 按钮）
        function adjustInitiative(id, delta) {
            const combatant = combatants.find(c => c.id === id);
            if (!combatant) return;

            combatant.initiative += delta;

            // 添加闪光动画效果
            const input = document.querySelector(`.combatant-card[data-id="${id}"] .initiative-input`);
            if (input) {
                input.classList.add('changed');
                setTimeout(() => input.classList.remove('changed'), 500);
            }

            // 重新排序并渲染
            sortByInitiative();
        }

        // 处理先攻输入框键盘事件
        function handleInitiativeKeydown(event, id) {
            if (event.key === 'ArrowUp') {
                event.preventDefault();
                adjustInitiative(id, 1);
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                adjustInitiative(id, -1);
            } else if (event.key === 'Enter') {
                event.target.blur();
            }
        }

        // 更新先攻值（直接输入）
        function updateInitiative(id, value) {
            const combatant = combatants.find(c => c.id === id);
            if (!combatant) return;

            const newInitiative = parseInt(value) || 0;
            combatant.initiative = newInitiative;

            // 添加闪光动画效果
            const input = document.querySelector(`.combatant-card[data-id="${id}"] .initiative-input`);
            if (input) {
                input.classList.add('changed');
                setTimeout(() => input.classList.remove('changed'), 500);
            }

            // 重新排序并渲染
            sortByInitiative();
        }

        // 打开HP模态框
        function openHPModal(id, action) {
            hpAction = action;
            document.getElementById('hpTargetId').value = id;
            document.getElementById('hpAmount').value = '';
            openModal('hpModal');
            document.getElementById('hpAmount').focus();
        }

        // 设置HP操作
        function setHPAction(action) {
            hpAction = action;
        }

        // 应用HP变化
        function applyHPChange(event) {
            event.preventDefault();
            const id = parseInt(document.getElementById('hpTargetId').value);
            const amount = parseInt(document.getElementById('hpAmount').value) || 0;
            
            const combatant = combatants.find(c => c.id === id);
            if (!combatant) return;

            if (hpAction === 'damage') {
                combatant.hp = Math.max(0, combatant.hp - amount);
            } else if (hpAction === 'heal') {
                combatant.hp = Math.min(combatant.maxHp, combatant.hp + amount);
            }

            renderCombatants();
            closeModal('hpModal');
        }

        // 打开状态模态框
        function openConditionModal(id) {
            document.getElementById('conditionTargetId').value = id;
            document.getElementById('conditionType').value = '';
            openModal('conditionModal');
        }

        // 添加状态
        function addCondition(event) {
            event.preventDefault();
            const id = parseInt(document.getElementById('conditionTargetId').value);
            const type = document.getElementById('conditionType').value;

            if (!type) return;

            const combatant = combatants.find(c => c.id === id);
            if (combatant && !combatant.conditions.includes(type)) {
                combatant.conditions.push(type);
            }

            renderCombatants();
            closeModal('conditionModal');
        }

        // 移除状态
        function removeCondition(combatantId, conditionType) {
            const combatant = combatants.find(c => c.id === combatantId);
            if (!combatant) return;

            combatant.conditions = combatant.conditions.filter(c => c !== conditionType);
            renderCombatants();
        }

        // 打开怪物数据库
        function openMonsterDB() {
            renderMonsters(currentMonsterCategory);
            openModal('monsterModal');
        }

        function switchTab(evt, tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            evt.currentTarget.classList.add('active');
            renderMonsters(tab);
        }

        function renderMonsters(category) {
            currentMonsterCategory = category;
            const list = document.getElementById('monsterList');
            const monsterList = monsters[category] || [];

            if (monsterList.length === 0) {
                list.innerHTML = '<p class="empty-text">当前分类暂无怪物数据</p>';
                return;
            }
            
            list.innerHTML = monsterList.map(m => `
                <div class="monster-card" onclick="addMonster('${category}', '${m.id}')">
                    <div class="monster-card-header">
                        <div class="monster-name-row">
                            <div class="monster-name">${m.name}</div>
                            <span class="monster-source-tag">${m.sourceLabel || '规则数据'}</span>
                        </div>
                        <span class="monster-cr">CR ${m.cr || '-'}</span>
                    </div>
                    <div class="monster-stats">HP: ${m.hp} | AC: ${m.ac} | 先攻: ${m.initiative >= 0 ? '+' : ''}${m.initiative}</div>
                    <div class="monster-attacks">${m.attackSummary || '暂无攻击信息'}</div>
                    <div class="monster-card-hint">点击卡片按上方数量添加</div>
                </div>
            `).join('');

            searchMonsters();
        }

        function searchMonsters() {
            const search = document.getElementById('monsterSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.monster-card');
            
            cards.forEach(card => {
                const haystack = card.textContent.toLowerCase();
                card.style.display = haystack.includes(search) ? 'flex' : 'none';
            });
        }

        function addMonster(category, monsterId) {
            const monster = (monsters[category] || []).find(item => item.id === monsterId);
            const monsterData = findMonsterById(monsterId) || monster;
            if (!monsterData) return;

            const quantity = getMonsterQuantity();

            for (let i = 0; i < quantity; i++) {
                combatants.push(createMonsterCombatant({ ...monsterData, id: monsterId }, i, quantity));
            }

            closeModal('monsterModal');
            sortByInitiative();
            showNotification(`已添加 ${quantity} 个 ${monsterData.name}`);
        }

        // 打开预设
        function openPresets() {
            renderPresets();
            openModal('presetModal');
        }

        // 渲染预设战斗列表
        function renderPresets() {
            const container = document.getElementById('presetList');
            if (!container) return;

            const presetCampaigns = getAllPresetCampaigns();
            if (Object.keys(presetCampaigns).length === 0) {
                container.innerHTML = '<p class="empty-text">暂无预设战斗</p>';
                return;
            }
            
            let html = '';
            
            Object.entries(presetCampaigns).forEach(([campaignKey, campaign]) => {
                html += `
                    <div class="preset-campaign">
                        <h4 class="preset-campaign-title">${campaign.name}</h4>
                        <p class="preset-campaign-desc">${campaign.description}</p>
                `;
                
                if (campaign.chapters) {
                    Object.entries(campaign.chapters).forEach(([chapterKey, chapter]) => {
                        html += `
                            <div class="preset-chapter">
                                <h5 class="preset-chapter-title">${chapter.name}</h5>
                                <p class="preset-chapter-desc">${chapter.description}</p>
                                <div class="preset-encounters">
                        `;
                        
                        if (chapter.encounters) {
                            Object.entries(chapter.encounters).forEach(([encounterKey, encounter]) => {
                                const encounterMonsters = Array.isArray(encounter.monsters) ? encounter.monsters : [];
                                const monsterList = encounterMonsters.map(m => {
                                    const monsterData = findMonsterById(m.id);
                                    return monsterData ? `${monsterData.name} x${m.count}` : `${m.id} x${m.count}`;
                                }).join(', ');
                                const totalCount = encounterMonsters.reduce((sum, item) => sum + (Number(item.count) || 0), 0);
                                const ruleLabel = campaignKey === 'extended_rules' ? '扩展规则' : '官方规则';
                                const difficultyLabel = encounter.difficulty ? formatEncounterDifficulty(encounter.difficulty) : '';
                                const tacticsHtml = encounter.tactics ? `<div class="preset-encounter-tactics">战术：${encounter.tactics}</div>` : '';
                                
                                html += `
                                    <div class="preset-encounter-card" onclick="loadPresetEncounter('${campaignKey}', '${chapterKey}', '${encounterKey}')">
                                        <div class="preset-encounter-name">${encounter.name}</div>
                                        <div class="preset-encounter-desc">${encounter.description}</div>
                                        <div class="preset-encounter-meta">
                                            <span class="preset-pill">${ruleLabel}</span>
                                            ${difficultyLabel ? `<span class="preset-pill">${difficultyLabel}</span>` : ''}
                                            <span class="preset-pill">共 ${totalCount} 个怪物</span>
                                        </div>
                                        <div class="preset-encounter-monsters">${monsterList}</div>
                                        ${tacticsHtml}
                                    </div>
                                `;
                            });
                        }
                        
                        html += '</div></div>';
                    });
                }
                
                html += '</div>';
            });
            
            container.innerHTML = html || '<p class="empty-text">暂无预设战斗</p>';
        }

        function buildExtendedPresetCampaign() {
            const encounters = MONSTERS_DATA_EXTENDED?.encounters?.encounters;
            if (!Array.isArray(encounters) || encounters.length === 0) {
                return null;
            }

            return {
                name: MONSTERS_DATA_EXTENDED.encounters.name || '扩展规则遭遇',
                description: MONSTERS_DATA_EXTENDED.encounters.description || '扩展规则中的常用遭遇组合',
                chapters: {
                    extension: {
                        name: '扩展规则遭遇',
                        description: '按扩展规则预置好怪物数量与战术',
                        encounters: Object.fromEntries(
                            encounters.map((encounter, index) => [
                                `extended_${index}`,
                                {
                                    name: encounter.name,
                                    description: encounter.description,
                                    difficulty: encounter.difficulty,
                                    tactics: encounter.tactics,
                                    monsters: (encounter.enemies || []).map(enemy => ({
                                        id: enemy.monster,
                                        count: enemy.count
                                    }))
                                }
                            ])
                        )
                    }
                }
            };
        }

        function getAllPresetCampaigns() {
            const campaigns = typeof PRESET_ENCOUNTERS !== 'undefined' && PRESET_ENCOUNTERS ? { ...PRESET_ENCOUNTERS } : {};
            const extendedCampaign = buildExtendedPresetCampaign();

            if (extendedCampaign) {
                campaigns.extended_rules = extendedCampaign;
            }

            return campaigns;
        }

        function formatEncounterDifficulty(difficulty) {
            const labels = {
                easy: '简单',
                medium: '中等',
                hard: '困难',
                deadly: '致命'
            };

            return labels[difficulty] || difficulty;
        }

        function findMonsterById(id) {
            const dataSources = [
                typeof MONSTERS_DATA !== 'undefined' ? MONSTERS_DATA : null,
                typeof MONSTERS_DATA_EXTENDED !== 'undefined' ? MONSTERS_DATA_EXTENDED : null
            ].filter(Boolean);
            
            for (const dataSource of dataSources) {
                for (const moduleKey in dataSource) {
                    const module = dataSource[moduleKey];
                    if (module && module.monsters && module.monsters[id]) {
                        return module.monsters[id];
                    }
                }
            }

            return null;
        }

        function loadPresetEncounter(campaignKey, chapterKey, encounterKey) {
            const presetCampaigns = getAllPresetCampaigns();
            const encounter = presetCampaigns[campaignKey]?.chapters?.[chapterKey]?.encounters?.[encounterKey];
            if (!encounter) return;
            
            if (combatants.length > 0) {
                if (!confirm('加载预设战斗将清空当前战斗列表，是否继续？')) {
                    return;
                }
                combatants = [];
            }

            currentTurn = 0;
            currentRound = 1;
            document.getElementById('roundNumber').textContent = currentRound;
            
            (encounter.monsters || []).forEach(monsterRef => {
                const monsterData = findMonsterById(monsterRef.id);
                if (!monsterData) return;

                const count = Math.max(1, Number(monsterRef.count) || 1);
                for (let i = 0; i < count; i++) {
                    combatants.push(createMonsterCombatant({ ...monsterData, id: monsterRef.id }, i, count));
                }
            });
            
            closeModal('presetModal');
            sortByInitiative();
            showNotification(`已加载预设战斗：${encounter.name}`);
        }

        // 显示通知
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
                color: var(--bg-primary);
                padding: 1rem 1.5rem;
                border-radius: 8px;
                font-weight: 600;
                box-shadow: 0 4px 20px rgba(57, 255, 20, 0.3);
                z-index: 10000;
                animation: slideIn 0.3s ease;
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        checkForDMAssistantTransfer();
        trackToolUsage('combat-tracker', '战斗追踪器');

        // 模态框控制
        function openModal(id) {
            document.getElementById(id).classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        // 点击模态框外部关闭
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('show');
                }
            });
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
            }
            if (e.key === ' ' && document.querySelectorAll('.modal-overlay.show').length === 0) {
                e.preventDefault();
                nextTurn();
            }
        });
    </script>
</body>
</html>
