﻿﻿﻿﻿﻿﻿﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战斗追踪器 | 阿正的赛博工具箱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/AZ-s-Cyber-Toolbox/design-system.css">
    <style>
        /* 战斗追踪器赛博朋克风格 */
        .combat-tracker-page {
            min-height: 100vh;
            padding-bottom: var(--space-16);
        }

        /* 页面头部 */
        .page-header {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, transparent 100%);
            padding: var(--space-8) 0;
            text-align: center;
            position: relative;
        }

        .page-header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-orange), transparent);
        }

        .page-title {
            font-size: var(--text-4xl);
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-2);
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: var(--text-lg);
        }

        .back-link {
            position: absolute;
            left: var(--space-6);
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-5);
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-tertiary) 100%);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: var(--text-sm);
            text-decoration: none;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-sm);
        }

        .back-link::before {
            content: '←';
            font-size: 1.2em;
            transition: transform var(--transition-fast);
        }

        .back-link:hover {
            color: var(--neon-orange);
            border-color: var(--neon-orange);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
            transform: translateY(-50%) translateX(-4px);
        }

        .back-link:hover::before {
            transform: translateX(-4px);
        }

        .back-link:active {
            transform: translateY(-50%) translateX(-2px);
        }

        /* 主容器 */
        .combat-container {
            max-width: 1200px;
            margin: var(--space-6) auto;
            padding: 0 var(--space-6);
        }

        /* 轮次控制面板 */
        .round-control-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            margin-bottom: var(--space-6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--space-4);
            position: relative;
            overflow: hidden;
        }

        .round-control-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-orange), var(--neon-red), var(--neon-pink));
        }

        .round-display {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .round-label {
            color: var(--text-secondary);
            font-size: var(--text-lg);
        }

        .round-number {
            font-size: var(--text-4xl);
            font-weight: 800;
            color: var(--neon-orange);
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
        }

        .combat-controls {
            display: flex;
            gap: var(--space-3);
        }

        /* 快捷操作栏 */
        .quick-actions {
            display: flex;
            gap: var(--space-4);
            margin-bottom: var(--space-6);
            flex-wrap: wrap;
        }

        /* 添加单位表单 */
        .add-combatant-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            margin-bottom: var(--space-6);
        }

        .add-combatant-card::before {
            content: '';
            display: block;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan));
            margin: calc(-1 * var(--space-6)) calc(-1 * var(--space-6)) var(--space-6);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr auto;
            gap: var(--space-3);
            align-items: end;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
            .form-grid .form-group:nth-child(1) {
                grid-column: 1 / -1;
            }
        }

        /* 战斗列表 */
        .initiative-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-5);
            flex-wrap: wrap;
            gap: var(--space-3);
        }

        .section-title {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--text-primary);
        }

        /* 战斗单位卡片 */
        .combatant-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .combatant-card {
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: var(--space-4);
            align-items: center;
            transition: all var(--transition-fast);
            position: relative;
        }

        .combatant-card:hover {
            border-color: var(--neon-cyan);
            background: var(--bg-hover);
        }

        .combatant-card.active-turn {
            border-color: var(--neon-orange);
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), rgba(255, 0, 160, 0.05));
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.2);
        }

        .combatant-card.active-turn::before {
            content: '▶';
            position: absolute;
            left: -20px;
            color: var(--neon-orange);
            font-size: var(--text-xl);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* 赛博朋克风格先攻编辑器 */
        .initiative-badge {
            position: relative;
            width: 64px;
            height: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            z-index: 1;
        }

        .initiative-badge::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(145deg, 
                rgba(255, 107, 53, 0.15) 0%, 
                rgba(255, 0, 85, 0.1) 50%,
                rgba(255, 107, 53, 0.15) 100%);
            border-radius: 16px;
            border: 1px solid rgba(255, 107, 53, 0.3);
            box-shadow: 
                0 0 20px rgba(255, 107, 53, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .initiative-badge:hover::before {
            border-color: rgba(255, 107, 53, 0.6);
            box-shadow: 
                0 0 30px rgba(255, 107, 53, 0.35),
                0 0 60px rgba(255, 107, 53, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .initiative-badge .label {
            font-size: 10px;
            font-weight: 700;
            color: var(--neon-orange);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
            position: relative;
            z-index: 1;
        }

        /* 先攻数值编辑器容器 */
        .initiative-editor {
            display: flex;
            align-items: center;
            gap: 4px;
            position: relative;
            z-index: 1;
        }

        /* 数值调整按钮 */
        .initiative-btn {
            width: 18px;
            height: 18px;
            border: none;
            background: rgba(255, 107, 53, 0.2);
            color: var(--neon-orange);
            font-size: 12px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(0.8);
        }

        .initiative-badge:hover .initiative-btn {
            opacity: 1;
            transform: scale(1);
        }

        .initiative-btn:hover {
            background: var(--neon-orange);
            color: var(--bg-primary);
            box-shadow: 0 0 15px rgba(255, 107, 53, 0.6);
            transform: scale(1.1);
        }

        .initiative-btn:active {
            transform: scale(0.95);
        }

        /* 先攻数值输入框 */
        .initiative-input {
            width: 32px;
            height: 28px;
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(255, 107, 53, 0.4);
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            font-family: 'Inter', monospace;
            text-shadow: 0 0 10px rgba(255, 107, 53, 0.8);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .initiative-input::-webkit-outer-spin-button,
        .initiative-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .initiative-input:focus {
            outline: none;
            border-color: var(--neon-orange);
            background: rgba(10, 10, 15, 0.95);
            box-shadow: 
                0 0 0 3px rgba(255, 107, 53, 0.2),
                0 0 20px rgba(255, 107, 53, 0.4),
                inset 0 0 10px rgba(255, 107, 53, 0.1);
            transform: scale(1.05);
        }

        .initiative-input:hover {
            border-color: rgba(255, 107, 53, 0.7);
        }

        /* 数值变化时的闪光动画 */
        @keyframes initiativeFlash {
            0% { 
                text-shadow: 0 0 10px rgba(255, 107, 53, 0.8);
                color: #fff;
            }
            50% { 
                text-shadow: 
                    0 0 20px rgba(255, 107, 53, 1),
                    0 0 40px rgba(255, 107, 53, 0.8),
                    0 0 60px rgba(255, 0, 85, 0.6);
                color: #fff;
                transform: scale(1.15);
            }
            100% { 
                text-shadow: 0 0 10px rgba(255, 107, 53, 0.8);
                color: #fff;
                transform: scale(1);
            }
        }

        .initiative-input.changed {
            animation: initiativeFlash 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 高先攻值特殊样式 */
        .initiative-input[data-value-high="true"] {
            color: #00ff9d;
            border-color: rgba(0, 255, 157, 0.5);
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.8);
        }

        .initiative-input[data-value-high="true"]:focus {
            box-shadow: 
                0 0 0 3px rgba(0, 255, 157, 0.2),
                0 0 20px rgba(0, 255, 157, 0.4);
        }

        /* 低先攻值特殊样式 */
        .initiative-input[data-value-low="true"] {
            color: #ff4757;
            border-color: rgba(255, 71, 87, 0.5);
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.8);
        }

        .initiative-input[data-value-low="true"]:focus {
            box-shadow: 
                0 0 0 3px rgba(255, 71, 87, 0.2),
                0 0 20px rgba(255, 71, 87, 0.4);
        }

        .combatant-info {
            display: flex;
            flex-direction: column;
            gap: var(--space-1);
        }

        .combatant-name {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--text-primary);
        }

        .combatant-type {
            font-size: var(--text-xs);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .combatant-type.player { color: var(--neon-green); }
        .combatant-type.enemy { color: var(--neon-red); }
        .combatant-type.npc { color: var(--neon-cyan); }

        .combatant-stats {
            display: flex;
            gap: var(--space-4);
            align-items: center;
        }

        .stat-box {
            text-align: center;
            padding: var(--space-2) var(--space-3);
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            min-width: 60px;
        }

        .stat-box .label {
            font-size: var(--text-xs);
            color: var(--text-muted);
            display: block;
        }

        .stat-box .value {
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--text-primary);
        }

        .hp-bar-container {
            width: 120px;
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            overflow: hidden;
            margin-top: var(--space-1);
        }

        .hp-bar {
            height: 100%;
            border-radius: var(--radius-full);
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .hp-bar.high { background: linear-gradient(90deg, var(--neon-green), #00cc00); }
        .hp-bar.medium { background: linear-gradient(90deg, var(--neon-orange), #ff9500); }
        .hp-bar.low { background: linear-gradient(90deg, var(--neon-red), #cc0000); }

        .combatant-actions {
            display: flex;
            gap: var(--space-2);
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            font-size: var(--text-lg);
        }

        .action-btn:hover {
            border-color: var(--neon-cyan);
            background: var(--bg-active);
            transform: scale(1.1);
        }

        .action-btn.damage:hover { border-color: var(--neon-red); color: var(--neon-red); }
        .action-btn.heal:hover { border-color: var(--neon-green); color: var(--neon-green); }
        .action-btn.condition:hover { border-color: var(--neon-purple); color: var(--neon-purple); }
        .action-btn.delete:hover { border-color: var(--error); color: var(--error); }

        /* 状态标签 - 赛博朋克风格 */
        .conditions-list {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: var(--space-2);
        }

        .condition-tag {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid transparent;
        }

        /* Debuff 状态 - 红色系 */
        .condition-tag.debuff {
            background: linear-gradient(135deg, rgba(255, 71, 87, 0.15), rgba(255, 0, 85, 0.1));
            border-color: rgba(255, 71, 87, 0.4);
            color: #ff6b81;
            text-shadow: 0 0 8px rgba(255, 71, 87, 0.4);
        }

        .condition-tag.debuff:hover {
            background: linear-gradient(135deg, rgba(255, 71, 87, 0.3), rgba(255, 0, 85, 0.2));
            border-color: rgba(255, 71, 87, 0.7);
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.4), 0 0 30px rgba(255, 71, 87, 0.2);
            transform: translateY(-2px) scale(1.05);
        }

        /* Buff 状态 - 绿色系 */
        .condition-tag.buff {
            background: linear-gradient(135deg, rgba(0, 255, 157, 0.15), rgba(0, 212, 170, 0.1));
            border-color: rgba(0, 255, 157, 0.4);
            color: #00ff9d;
            text-shadow: 0 0 8px rgba(0, 255, 157, 0.4);
        }

        .condition-tag.buff:hover {
            background: linear-gradient(135deg, rgba(0, 255, 157, 0.3), rgba(0, 212, 170, 0.2));
            border-color: rgba(0, 255, 157, 0.7);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.4), 0 0 30px rgba(0, 255, 157, 0.2);
            transform: translateY(-2px) scale(1.05);
        }

        /* 环境效果 - 蓝色系 */
        .condition-tag.environmental {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 150, 255, 0.1));
            border-color: rgba(0, 212, 255, 0.4);
            color: #00d4ff;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.4);
        }

        .condition-tag.environmental:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 150, 255, 0.2));
            border-color: rgba(0, 212, 255, 0.7);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4), 0 0 30px rgba(0, 212, 255, 0.2);
            transform: translateY(-2px) scale(1.05);
        }

        /* 中性状态 - 紫色系 */
        .condition-tag.neutral {
            background: linear-gradient(135deg, rgba(176, 38, 255, 0.15), rgba(138, 43, 226, 0.1));
            border-color: rgba(176, 38, 255, 0.4);
            color: #d980ff;
            text-shadow: 0 0 8px rgba(176, 38, 255, 0.4);
        }

        .condition-tag.neutral:hover {
            background: linear-gradient(135deg, rgba(176, 38, 255, 0.3), rgba(138, 43, 226, 0.2));
            border-color: rgba(176, 38, 255, 0.7);
            box-shadow: 0 0 15px rgba(176, 38, 255, 0.4), 0 0 30px rgba(176, 38, 255, 0.2);
            transform: translateY(-2px) scale(1.05);
        }

        /* 状态标签图标 */
        .condition-tag .icon {
            font-size: 12px;
            filter: drop-shadow(0 0 4px currentColor);
        }

        /* 状态提示框 */
        .condition-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            width: 220px;
            padding: 12px 14px;
            background: rgba(15, 15, 25, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            opacity: 0;
            visibility: hidden;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            pointer-events: none;
        }

        .condition-tag:hover .condition-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-4px);
        }

        .condition-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 8px solid transparent;
            border-top-color: rgba(15, 15, 25, 0.95);
        }

        .condition-tooltip .tooltip-title {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .condition-tooltip .tooltip-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .condition-tooltip .tooltip-effect {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-style: italic;
        }

        .condition-tooltip .tooltip-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: auto;
        }

        .condition-tooltip .tooltip-type.debuff {
            background: rgba(255, 71, 87, 0.3);
            color: #ff6b81;
        }

        .condition-tooltip .tooltip-type.buff {
            background: rgba(0, 255, 157, 0.3);
            color: #00ff9d;
        }

        .condition-tooltip .tooltip-type.environmental {
            background: rgba(0, 212, 255, 0.3);
            color: #00d4ff;
        }

        .condition-tooltip .tooltip-type.neutral {
            background: rgba(176, 38, 255, 0.3);
            color: #d980ff;
        }

        /* 攻击信息展示 - 赛博朋克风格 */
        .combatant-attack-summary {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-top: 8px;
            padding: 8px 12px;
            background: linear-gradient(135deg, 
                rgba(255, 107, 53, 0.08) 0%, 
                rgba(255, 0, 85, 0.05) 100%);
            border-left: 3px solid var(--neon-orange);
            border-radius: 0 8px 8px 0;
            font-size: 12px;
            line-height: 1.5;
        }

        .combatant-attack-label {
            flex-shrink: 0;
            padding: 2px 8px;
            background: rgba(255, 107, 53, 0.2);
            color: var(--neon-orange);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 4px;
            text-shadow: 0 0 8px rgba(255, 107, 53, 0.5);
        }

        .combatant-attack-summary span:last-child {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        /* 攻击信息悬停效果 */
        .combatant-attack-summary:hover {
            background: linear-gradient(135deg, 
                rgba(255, 107, 53, 0.15) 0%, 
                rgba(255, 0, 85, 0.1) 100%);
            border-left-color: #ff8c5a;
            box-shadow: 0 0 15px rgba(255, 107, 53, 0.2);
            transition: all 0.3s ease;
        }

        /* 玩家先攻填写弹窗 - 赛博朋克风格 */
        .player-initiative-modal .modal-content {
            max-width: 600px;
            background: linear-gradient(145deg, rgba(15, 15, 25, 0.98), rgba(25, 25, 40, 0.98));
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 
                0 0 60px rgba(0, 212, 255, 0.15),
                0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .player-initiative-modal .modal-header {
            background: linear-gradient(135deg, 
                rgba(0, 212, 255, 0.1) 0%, 
                rgba(0, 150, 255, 0.05) 100%);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .player-initiative-modal .modal-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #00d4ff, #0096ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .player-initiative-modal .modal-title::before {
            content: '🎲';
            font-size: 1.6rem;
            -webkit-text-fill-color: initial;
        }

        .player-initiative-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px 0;
        }

        .player-initiative-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.03) 0%, 
                rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .player-initiative-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-blue));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .player-initiative-item:hover {
            background: linear-gradient(135deg, 
                rgba(0, 212, 255, 0.08) 0%, 
                rgba(0, 150, 255, 0.04) 100%);
            border-color: rgba(0, 212, 255, 0.25);
            transform: translateX(4px);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.1);
        }

        .player-initiative-item:hover::before {
            opacity: 1;
        }

        .player-initiative-item.focused {
            background: linear-gradient(135deg, 
                rgba(0, 212, 255, 0.12) 0%, 
                rgba(0, 150, 255, 0.06) 100%);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
        }

        .player-initiative-item.focused::before {
            opacity: 1;
        }

        .player-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .player-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-name .player-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .player-meta {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            gap: 12px;
        }

        .player-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .initiative-input-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .initiative-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        /* 玩家先攻弹窗专用的输入框样式 */
        .player-initiative-modal .initiative-input {
            width: 80px;
            height: 48px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            color: #00d4ff;
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            padding: 0 12px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .player-initiative-modal .initiative-input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        .player-initiative-modal .initiative-input::placeholder {
            color: rgba(0, 212, 255, 0.3);
        }

        .roll-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 150, 255, 0.15));
            border-radius: 10px;
            color: var(--neon-cyan);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .roll-btn:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.35), rgba(0, 150, 255, 0.25));
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .roll-btn:active {
            transform: scale(0.95);
        }

        .roll-btn.spinning {
            animation: diceSpin 0.6s ease-in-out;
        }

        @keyframes diceSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .modal-actions .btn {
            flex: 1;
            height: 48px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .modal-actions .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
        }

        .modal-actions .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .modal-actions .btn-primary {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            border: none;
            color: #000;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .modal-actions .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 212, 255, 0.4);
        }

        .modal-actions .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .encounter-info {
            padding: 16px 20px;
            background: linear-gradient(135deg, 
                rgba(255, 107, 53, 0.1) 0%, 
                rgba(255, 0, 85, 0.05) 100%);
            border-radius: 12px;
            margin: 0 20px 16px;
            border: 1px solid rgba(255, 107, 53, 0.2);
        }

        .encounter-info h4 {
            font-size: 1rem;
            color: var(--neon-orange);
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .encounter-info p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: var(--space-4);
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-content.large {
            max-width: 800px;
        }

        .modal-header {
            padding: var(--space-5);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: var(--text-xl);
            color: var(--text-secondary);
            transition: all var(--transition-fast);
        }

        .modal-close:hover {
            background: var(--error);
            color: white;
        }

        .modal-body {
            padding: var(--space-5);
        }

        /* 怪物数据库 */
        .monster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--space-4);
            max-height: 400px;
            overflow-y: auto;
        }

        .monster-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .monster-card:hover {
            border-color: var(--neon-orange);
            background: var(--bg-hover);
            transform: translateY(-2px);
        }

        .monster-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .monster-stats {
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }

        /* 预设战斗样式 */
        .preset-campaign {
            margin-bottom: var(--space-6);
            padding: var(--space-4);
            background: linear-gradient(135deg, var(--bg-secondary), rgba(255, 107, 53, 0.05));
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
        }

        .preset-campaign-title {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--neon-orange);
            margin-bottom: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .preset-campaign-title::before {
            content: '📖';
        }

        .preset-campaign-desc {
            color: var(--text-secondary);
            font-size: var(--text-sm);
            margin-bottom: var(--space-4);
            padding-bottom: var(--space-3);
            border-bottom: 1px solid var(--border-color);
        }

        .preset-chapter {
            margin-left: var(--space-4);
            margin-bottom: var(--space-4);
            padding: var(--space-3);
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--neon-orange);
        }

        .preset-chapter-title {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-1);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .preset-chapter-title::before {
            content: '📂';
        }

        .preset-chapter-desc {
            color: var(--text-secondary);
            font-size: var(--text-xs);
            margin-bottom: var(--space-3);
        }

        .preset-encounters {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: var(--space-3);
        }

        .preset-encounter-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--space-3);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .preset-encounter-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--neon-orange), var(--neon-red));
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .preset-encounter-card:hover {
            border-color: var(--neon-orange);
            transform: translateX(4px);
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.15);
        }

        .preset-encounter-card:hover::before {
            opacity: 1;
        }

        .preset-encounter-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-1);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .preset-encounter-name::before {
            content: '⚔️';
        }

        .preset-encounter-desc {
            font-size: var(--text-xs);
            color: var(--text-secondary);
            margin-bottom: var(--space-2);
        }

        .preset-encounter-monsters {
            font-size: var(--text-xs);
            color: var(--neon-orange);
            font-weight: 500;
            padding-top: var(--space-2);
            border-top: 1px dashed var(--border-color);
        }

        /* 通知动画 */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* 搜索框 */
        .search-box {
            position: relative;
            margin-bottom: var(--space-4);
        }

        .search-input {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            padding-left: var(--space-10);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: var(--text-base);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--neon-cyan);
        }

        .search-icon {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* 标签页 */
        .tabs {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-4);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: var(--space-2);
        }

        .tab-btn {
            padding: var(--space-2) var(--space-4);
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition-fast);
            border-radius: var(--radius-md);
        }

        .tab-btn:hover {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        .tab-btn.active {
            color: var(--neon-cyan);
            background: rgba(0, 217, 255, 0.1);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: var(--space-12);
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: var(--space-4);
            opacity: 0.5;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .page-title {
                font-size: var(--text-3xl);
            }

            .back-link {
                position: static;
                transform: none;
                margin-bottom: var(--space-4);
                justify-content: center;
            }

            .round-control-panel {
                flex-direction: column;
                text-align: center;
            }

            .combatant-card {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .combatant-card.active-turn::before {
                left: var(--space-2);
                top: var(--space-2);
            }

            .combatant-stats {
                justify-content: center;
            }

            .combatant-actions {
                justify-content: center;
            }
        }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="combat-tracker-page">
    <!-- 页面头部 -->
    <header class="page-header">
        <div class="page-header-shell">
            <a href="/AZ-s-Cyber-Toolbox/index.html" class="back-link">返回首页</a>
            <div class="page-header-content">
                <p class="page-eyebrow">⚔️ 先攻排序 · ❤️ HP 管理 · ✨ 状态追踪</p>
                <h1 class="page-title">⚔️ 战斗追踪器</h1>
                <p class="page-subtitle">管理回合制战斗，追踪先攻、HP 和状态效果</p>
                <div class="page-header-actions">
                    <a class="btn btn-secondary btn-sm" href="/AZ-s-Cyber-Toolbox/dm-assistant/index.html">👑 打开 DM Assistant</a>
                </div>
            </div>
        </div>
    </header>

    <!-- 主容器 -->
    <main class="combat-container">
        <!-- 轮次控制面板 -->
        <div class="round-control-panel">
            <div class="round-display">
                <span class="round-label">第</span>
                <span class="round-number" id="roundNumber">1</span>
                <span class="round-label">轮</span>
            </div>
            <div class="combat-controls">
                <button class="btn btn-secondary" onclick="prevTurn()">← 上一回合</button>
                <button class="btn btn-primary" onclick="nextTurn()">下一回合 →</button>
                <button class="btn btn-danger" onclick="resetCombat()">🔄 重置</button>
            </div>
        </div>

        <!-- 快捷操作 -->
        <div class="quick-actions">
            <button class="btn btn-secondary" onclick="openMonsterDB()">📚 怪物数据库</button>
            <button class="btn btn-secondary" onclick="openPresets()">⚔️ 预设战斗</button>
            <button class="btn btn-secondary" onclick="sortByInitiative()">📊 按先攻排序</button>
        </div>

        <!-- 添加战斗单位 -->
        <div class="add-combatant-card">
            <h2 class="section-title" style="margin-bottom: var(--space-4);">➕ 添加战斗单位</h2>
            <form class="form-grid" onsubmit="addCombatant(event)">
                <div class="form-group">
                    <label class="form-label">名称</label>
                    <input type="text" class="form-input" id="unitName" placeholder="输入单位名称" required>
                </div>
                <div class="form-group">
                    <label class="form-label">类型</label>
                    <select class="form-select" id="unitType">
                        <option value="player">玩家</option>
                        <option value="enemy">敌人</option>
                        <option value="npc">NPC</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">先攻</label>
                    <input type="number" class="form-input" id="unitInitiative" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">HP</label>
                    <input type="number" class="form-input" id="unitHP" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">最大HP</label>
                    <input type="number" class="form-input" id="unitMaxHP" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">AC</label>
                    <input type="number" class="form-input" id="unitAC" placeholder="10">
                </div>
                <button type="submit" class="btn btn-primary">添加</button>
            </form>
        </div>

        <!-- 战斗列表 -->
        <div class="initiative-section">
            <div class="section-header">
                <h2 class="section-title">📋 战斗顺序</h2>
                <button class="btn btn-danger" onclick="clearAll()">清空全部</button>
            </div>
            <div class="combatant-list" id="combatantList">
                <div class="empty-state">
                    <div class="empty-state-icon">⚔️</div>
                    <p>暂无战斗单位</p>
                    <p style="font-size: var(--text-sm);">添加单位开始战斗追踪</p>
                </div>
            </div>
        </div>
    </main>

    <!-- HP调整模态框 -->
    <div class="modal-overlay" id="hpModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">调整生命值</h3>
                <button class="modal-close" onclick="closeModal('hpModal')">×</button>
            </div>
            <div class="modal-body">
                <form onsubmit="applyHPChange(event)">
                    <input type="hidden" id="hpTargetId">
                    <div class="form-group">
                        <label class="form-label">数值</label>
                        <input type="number" class="form-input" id="hpAmount" placeholder="输入数值" required autofocus>
                    </div>
                    <div style="display: flex; gap: var(--space-3); margin-bottom: var(--space-4);">
                        <button type="button" class="btn btn-danger" style="flex: 1;" onclick="setHPAction('damage')">⚔️ 伤害</button>
                        <button type="button" class="btn btn-success" style="flex: 1;" onclick="setHPAction('heal')">💚 治疗</button>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">确认</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 状态效果模态框 -->
    <div class="modal-overlay" id="conditionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">添加状态效果</h3>
                <button class="modal-close" onclick="closeModal('conditionModal')">×</button>
            </div>
            <div class="modal-body">
                <form onsubmit="addCondition(event)">
                    <input type="hidden" id="conditionTargetId">
                    <div class="form-group">
                        <label class="form-label">状态类型</label>
                        <select class="form-select" id="conditionType" required>
                            <option value="">选择状态</option>
                            <optgroup label="控制状态 (Debuffs)">
